ja kolmannet osapuolet","privacy-s4-b":"Tilaus- ja tilitiedot tallennetaan Supabasen kautta. Discord- ja YouTube-painikkeet ohjaavat ulkoisiin palveluihin, joilla on omat tietosuojakäytäntönsä.","privacy-s5-t":"5. Evästeet ja oikeutesi","privacy-s5-b":"Käytämme mahdollisimman vähän evästeitä — kieleen ja kirjautumiseen. Voit pyytää pääsyä tietoihisi, niiden korjausta tai poistoa kirjoittamalla osoitteeseen <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Lapset","privacy-s6-b":"Palvelua ei ole tarkoitettu alle 13-vuotiaille. Jos havaitsemme saaneemme tietoja alle 13-vuotiaalta, poistamme ne.","privacy-s7-t":"7. Muutokset ja yhteystiedot","privacy-s7-b":"Voimme päivittää tätä käytäntöä. Käytön jatkaminen tarkoittaa nykyisen version hyväksymistä. Kysymykset: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Kaikki oikeudet pidätetään.","footer-terms":"Käyttöehdot","footer-privacy":"Tietosuojakäytäntö","footer-cookies":"Evästeet","footer-support":"Tuki","footer-contact":"Onko kysyttävää? Kirjoita osoitteeseen <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"da":{"html-lang":"da","back-home":"← Tilbage til forsiden","languages-label":"Sprog","effective-label":"Gælder fra","effective-date":"23. april 2026","toc-title":"Afsnit","pick-language":"Vælg et sprog","terms-title":"Servicevilkår","terms-subtitle":"Korte, klare regler for brug af Evades 3-webstedet og -spillet.","terms-intro":"Læs disse vilkår grundigt, før du bruger evades3.com og spillet Evades 3 («Tjenesten»). Ved at bruge Tjenesten accepterer du disse vilkår.","terms-s1-t":"1. Accept af vilkårene","terms-s1-b":"Ved at besøge webstedet eller starte spillet bekræfter du, at du har læst og accepteret disse vilkår. Hvis du ikke er enig, må du ikke bruge Tjenesten.","terms-s2-t":"2. Om Tjenesten og alfa-status","terms-s2-b":"Evades 3 er et browserbaseret arkadespil i lukket alfa. Funktioner, balance, arenaer og tilgængelighed kan ændres eller fjernes uden varsel. Fremskridt kan nulstilles.","terms-s3-t":"3. Alder og konti","terms-s3-b":"Du skal være mindst 13 år gammel. Brugere under 18 skal have samtykke fra forælder eller værge. Du er ansvarlig for sikkerheden af din konto og adgangskode.","terms-s4-t":"4. Acceptabel brug","terms-s4-b":"Følgende er ikke tilladt: <ul><li>brug af snyd, bots, exploits eller tredjepartssoftware til fordel;</li><li>chikane, mobning eller spam mod andre spillere;</li><li>forsøg på at forstyrre serverne eller reverse engineering;</li><li>oprettelse af flere konti for at omgå bans.</li></ul>","terms-s5-t":"5. Intellektuelle rettigheder","terms-s5-b":"Kode, grafik, lyd, navnet «Evades 3» og logoet tilhører Evades 3-teamet. Kopiering, videresalg eller afledte værker kræver skriftlig tilladelse.","terms-s6-t":"6. Alfa, «som den er», ansvar","terms-s6-b":"Tjenesten leveres «som den er» uden garanti for tilgængelighed, databevaring eller specifikke funktioner. I det omfang loven tillader, er teamet ikke ansvarligt for indirekte eller tilfældige skader.","terms-s7-t":"7. Ændringer og ophør","terms-s7-b":"Vi kan opdatere disse vilkår. Fortsat brug betyder accept. Vi kan suspendere eller lukke adgangen ved overtrædelser eller udviklingsbehov.","terms-s8-t":"8. Kontakt","terms-s8-b":"Spørgsmål om disse vilkår: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Privatlivspolitik","privacy-subtitle":"Hvilke data vi indsamler, hvorfor og hvordan vi beskytter dem.","privacy-intro":"Denne politik beskriver, hvordan evades3.com og spillet Evades 3 («Tjenesten») behandler personoplysninger.","privacy-s1-t":"1. Introduktion","privacy-s1-b":"Vi respekterer dit privatliv og indsamler kun det, der er nødvendigt for at drive Tjenesten og kommunikere med dig. Vi sælger ikke dine data.","privacy-s2-t":"2. Data vi indsamler","privacy-s2-b":"<ul><li>E-mail og valgt sprog — når du tilmelder dig alfa-ventelisten;</li><li>Kaldenavn og hashet adgangskode — ved kontooprettelse;</li><li>Tekniske data: browser, enhed, omtrentlig placering via IP;</li><li>Anonym besøgsstatistik.</li></ul>","privacy-s3-t":"3. Sådan bruger vi data","privacy-s3-b":"<ul><li>Sende alfa-invitationer og vigtige opdateringer;</li><li>Drive og forbedre Tjenesten;</li><li>Beskytte mod snyd, spam og misbrug.</li></ul>","privacy-s4-t":"4. Opbevaring og tredjeparter","privacy-s4-b":"Abonnements- og kontodata opbevares via Supabase. Discord- og YouTube-knapperne linker til eksterne tjenester med deres egne politikker.","privacy-s5-t":"5. Cookies og dine rettigheder","privacy-s5-b":"Vi bruger et minimum af cookies — til sprog og login. Du kan anmode om indsigt, rettelse eller sletning af dine data ved at skrive til <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Børn","privacy-s6-b":"Tjenesten er ikke beregnet til børn under 13 år. Hvis vi opdager, at vi har modtaget data fra et barn under 13 år, vil vi slette dem.","privacy-s7-t":"7. Ændringer og kontakt","privacy-s7-b":"Vi kan opdatere denne politik. Fortsat brug betyder accept af den aktuelle version. Spørgsmål: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Alle rettigheder forbeholdes.","footer-terms":"Servicevilkår","footer-privacy":"Privatlivspolitik","footer-cookies":"Cookies","footer-support":"Support","footer-contact":"Har du spørgsmål? Skriv til <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"cs":{"html-lang":"cs","back-home":"← Zpět na hlavní stránku","languages-label":"Jazyk","effective-label":"Platné od","effective-date":"23. dubna 2026","toc-title":"Sekce","pick-language":"Vyberte jazyk","terms-title":"Podmínky služby","terms-subtitle":"Stručná a jasná pravidla pro používání webu a hry Evades 3.","terms-intro":"Než začnete používat web evades3.com a hru Evades 3 («Služba»), pozorně si přečtěte tyto Podmínky. Používáním Služby s nimi souhlasíte.","terms-s1-t":"1. Přijetí podmínek","terms-s1-b":"Návštěvou webu nebo spuštěním hry potvrzujete, že jste si tyto Podmínky přečetli a přijímáte je. Pokud nesouhlasíte, Službu nepoužívejte.","terms-s2-t":"2. O Službě a stavu alfa","terms-s2-b":"Evades 3 je prohlížečová arkádová hra v uzavřené alfě. Funkce, vyvážení, arény a dostupnost se mohou bez předchozího upozornění měnit nebo být odstraněny. Postup může být resetován.","terms-s3-t":"3. Věk a účty","terms-s3-b":"Musíte mít alespoň 13 let. Uživatelé mladší 18 let potřebují souhlas rodiče nebo zákonného zástupce. Za bezpečnost svého účtu a hesla odpovídáte vy.","terms-s4-t":"4. Přijatelné užívání","terms-s4-b":"Zakázáno je: <ul><li>používat cheaty, boty, exploity nebo software třetích stran pro výhodu;</li><li>obtěžovat ostatní hráče, šikanovat nebo spamovat;</li><li>narušovat servery nebo provádět zpětnou analýzu;</li><li>vytvářet více účtů k obejití banu.</li></ul>","terms-s5-t":"5. Duševní vlastnictví","terms-s5-b":"Kód, grafika, zvuk, jméno «Evades 3» a logo patří týmu Evades 3. Kopírování, prodej nebo odvozená díla vyžadují písemný souhlas.","terms-s6-t":"6. Alfa, «jak je», odpovědnost","terms-s6-b":"Služba je poskytována «jak je» bez záruky dostupnosti, zachování dat nebo konkrétních funkcí. V rozsahu povoleném zákonem tým neodpovídá za nepřímé nebo následné škody.","terms-s7-t":"7. Změny a ukončení","terms-s7-b":"Tyto Podmínky můžeme aktualizovat. Pokračování v používání znamená souhlas. Můžeme pozastavit nebo ukončit přístup při porušeních nebo z vývojových důvodů.","terms-s8-t":"8. Kontakt","terms-s8-b":"Dotazy k těmto Podmínkám: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Zásady ochrany osobních údajů","privacy-subtitle":"Jaká data sbíráme, proč a jak je chráníme.","privacy-intro":"Tyto zásady popisují, jak web evades3.com a hra Evades 3 («Služba») zpracovávají osobní údaje.","privacy-s1-t":"1. Úvod","privacy-s1-b":"Respektujeme vaše soukromí a sbíráme jen to, co je potřeba k provozu Služby a komunikaci s vámi. Vaše data neprodáváme.","privacy-s2-t":"2. Jaká data sbíráme","privacy-s2-b":"<ul><li>E-mail a zvolený jazyk — při zápisu do alfa fronty;</li><li>Přezdívku a hash hesla — při registraci účtu;</li><li>Technická data: prohlížeč, zařízení, přibližná poloha z IP;</li><li>Anonymní statistiky návštěv.</li></ul>","privacy-s3-t":"3. Jak data používáme","privacy-s3-b":"<ul><li>Odesílání alfa pozvánek a důležitých novinek;</li><li>Provoz a vylepšování Služby;</li><li>Ochrana proti cheatům, spamu a zneužití.</li></ul>","privacy-s4-t":"4. Ukládání a třetí strany","privacy-s4-b":"Data odběrů a účtů jsou uložena přes Supabase. Tlačítka Discord a YouTube vedou na externí služby s vlastními zásadami ochrany osobních údajů.","privacy-s5-t":"5. Cookies a vaše práva","privacy-s5-b":"Používáme minimum cookies — pro zapamatování jazyka a přihlášení. O přístup, opravu nebo smazání svých dat můžete požádat na <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Děti","privacy-s6-b":"Služba není určena dětem do 13 let. Pokud zjistíme, že jsme získali data od dítěte mladšího 13 let, smažeme je.","privacy-s7-t":"7. Změny a kontakt","privacy-s7-b":"Tyto zásady můžeme aktualizovat. Pokračování v používání znamená souhlas s aktuální verzí. Dotazy: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Všechna práva vyhrazena.","footer-terms":"Podmínky služby","footer-privacy":"Zásady ochrany osobních údajů","footer-cookies":"Cookies","footer-support":"Podpora","footer-contact":"Máte dotazy? Napište na <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"ro":{"html-lang":"ro","back-home":"← Înapoi la pagina principală","languages-label":"Limbă","effective-label":"Valabil de la","effective-date":"23 aprilie 2026","toc-title":"Secțiuni","pick-language":"Alege o limbă","terms-title":"Termeni de utilizare","terms-subtitle":"Reguli scurte și clare pentru utilizarea site-ului și a jocului Evades 3.","terms-intro":"Te rugăm să citești cu atenție acești Termeni înainte de a folosi evades3.com și jocul Evades 3 («Serviciul»). Prin utilizarea Serviciului accepți acești Termeni.","terms-s1-t":"1. Acceptarea termenilor","terms-s1-b":"Vizitând site-ul sau lansând jocul, confirmi că ai citit și accepți acești Termeni. Dacă nu ești de acord, nu folosi Serviciul.","terms-s2-t":"2. Despre Serviciu și statutul alfa","terms-s2-b":"Evades 3 este un joc arcade de browser în alfa închisă. Funcționalitățile, echilibrul, arenele și disponibilitatea se pot schimba sau pot fi eliminate fără notificare. Progresul poate fi resetat.","terms-s3-t":"3. Vârsta și conturile","terms-s3-b":"Trebuie să ai cel puțin 13 ani. Utilizatorii sub 18 ani au nevoie de consimțământul unui părinte sau tutore. Ești responsabil pentru securitatea contului și parolei tale.","terms-s4-t":"4. Utilizare acceptabilă","terms-s4-b":"Este interzis: <ul><li>folosirea de cheat-uri, boți, exploit-uri sau software terț pentru avantaj;</li><li>hărțuirea altor jucători, bullying sau spam;</li><li>perturbarea serverelor sau inginerie inversă;</li><li>crearea mai multor conturi pentru a evita banările.</li></ul>","terms-s5-t":"5. Proprietate intelectuală","terms-s5-b":"Codul, grafica, sunetul, numele «Evades 3» și logo-ul aparțin echipei Evades 3. Copierea, revânzarea sau lucrările derivate necesită permisiune scrisă.","terms-s6-t":"6. Alfa, «așa cum este», răspundere","terms-s6-b":"Serviciul este oferit «așa cum este», fără garanții de disponibilitate, păstrare a datelor sau funcții specifice. În limitele permise de lege, echipa nu răspunde pentru daune indirecte sau incidentale.","terms-s7-t":"7. Modificări și încetare","terms-s7-b":"Putem actualiza acești Termeni. Utilizarea continuă înseamnă acceptare. Putem suspenda sau închide accesul pentru încălcări sau nevoi de dezvoltare.","terms-s8-t":"8. Contact","terms-s8-b":"Întrebări despre acești Termeni: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Politica de confidențialitate","privacy-subtitle":"Ce date colectăm, de ce și cum le protejăm.","privacy-intro":"Această Politică descrie modul în care evades3.com și jocul Evades 3 («Serviciul») prelucrează date personale.","privacy-s1-t":"1. Introducere","privacy-s1-b":"Îți respectăm confidențialitatea și colectăm doar ceea ce este necesar pentru a rula Serviciul și a comunica cu tine. Nu vindem datele tale.","privacy-s2-t":"2. Ce date colectăm","privacy-s2-b":"<ul><li>E-mail și limba aleasă — când te înscrii la lista alfa;</li><li>Nickname și parolă hash-uită — la crearea contului;</li><li>Date tehnice: browser, dispozitiv, locație aproximativă din IP;</li><li>Statistici anonime de vizitare.</li></ul>","privacy-s3-t":"3. Cum folosim datele","privacy-s3-b":"<ul><li>Trimiterea invitațiilor alfa și a actualizărilor importante;</li><li>Funcționarea și îmbunătățirea Serviciului;</li><li>Protecție împotriva cheat-urilor, spamului și abuzurilor.</li></ul>","privacy-s4-t":"4. Stocare și terți","privacy-s4-b":"Datele de abonament și cont sunt stocate prin Supabase. Butoanele Discord și YouTube duc la servicii externe cu propriile politici de confidențialitate.","privacy-s5-t":"5. Cookie-uri și drepturile tale","privacy-s5-b":"Folosim un minimum de cookie-uri — pentru limbă și autentificare. Poți cere acces, rectificare sau ștergere a datelor tale scriind la <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Copii","privacy-s6-b":"Serviciul nu este destinat copiilor sub 13 ani. Dacă descoperim că am primit date de la un copil sub 13 ani, le vom șterge.","privacy-s7-t":"7. Modificări și contact","privacy-s7-b":"Putem actualiza această Politică. Utilizarea continuă înseamnă acceptarea versiunii curente. Întrebări: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Toate drepturile rezervate.","footer-terms":"Termeni de utilizare","footer-privacy":"Politica de confidențialitate","footer-cookies":"Cookie-uri","footer-support":"Asistență","footer-contact":"Ai întrebări? Scrie-ne la <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"hu":{"html-lang":"hu","back-home":"← Vissza a főoldalra","languages-label":"Nyelv","effective-label":"Érvényes","effective-date":"2026. április 23.","toc-title":"Részek","pick-language":"Válassz nyelvet","terms-title":"Felhasználási feltételek","terms-subtitle":"Rövid és érthető szabályok az Evades 3 weboldal és játék használatához.","terms-intro":"Kérjük, olvasd el figyelmesen ezeket a Feltételeket, mielőtt használnád az evades3.com oldalt és az Evades 3 játékot («Szolgáltatás»). A Szolgáltatás használatával elfogadod ezeket a Feltételeket.","terms-s1-t":"1. A feltételek elfogadása","terms-s1-b":"Az oldal felkeresésével vagy a játék elindításával megerősíted, hogy elolvastad és elfogadod ezeket a Feltételeket. Ha nem értesz egyet, ne használd a Szolgáltatást.","terms-s2-t":"2. A Szolgáltatás és az alfa állapot","terms-s2-b":"Az Evades 3 böngészős ügyességi játék zárt alfában. A funkciók, balansz, arénák és elérhetőség előzetes értesítés nélkül változhatnak vagy megszűnhetnek. A fejlődés resetelődhet.","terms-s3-t":"3. Életkor és fiókok","terms-s3-b":"Legalább 13 évesnek kell lenned. A 18 év alattiak szülői vagy gondviselői beleegyezést igényelnek. A fiókod és jelszavad biztonságáért te felelsz.","terms-s4-t":"4. Elfogadható használat","terms-s4-b":"Tilos: <ul><li>csalást, botokat, exploitokat vagy harmadik féltől származó szoftvert használni előny érdekében;</li><li>más játékosokat zaklatni, iskolai erőszakot vagy spamet küldeni;</li><li>zavarni a szervereket vagy visszafejteni a rendszert;</li><li>több fiókot létrehozni a tiltás kijátszására.</li></ul>","terms-s5-t":"5. Szellemi tulajdon","terms-s5-b":"A kód, a grafika, a hangok, az «Evades 3» név és a logó az Evades 3 csapatának tulajdona. Másolás, viszonteladás vagy származékos művek csak írásos engedéllyel.","terms-s6-t":"6. Alfa, «ahogy van», felelősség","terms-s6-b":"A Szolgáltatás «ahogy van» elérhető, elérhetőségre, adatmegőrzésre vagy bizonyos funkciókra vonatkozó garancia nélkül. A törvény által megengedett mértékben a csapat nem felel a közvetett vagy járulékos károkért.","terms-s7-t":"7. Változtatások és megszüntetés","terms-s7-b":"Frissíthetjük ezeket a Feltételeket. A folyamatos használat elfogadást jelent. A hozzáférést szabálysértés vagy fejlesztési igény miatt felfüggeszthetjük vagy megszüntethetjük.","terms-s8-t":"8. Kapcsolat","terms-s8-b":"Kérdések a Feltételekkel kapcsolatban: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Adatvédelmi szabályzat","privacy-subtitle":"Milyen adatokat gyűjtünk, miért és hogyan védjük őket.","privacy-intro":"Ez a szabályzat leírja, hogy az evades3.com oldal és az Evades 3 játék («Szolgáltatás») hogyan kezel személyes adatokat.","privacy-s1-t":"1. Bevezetés","privacy-s1-b":"Tiszteletben tartjuk az adatvédelmedet, és csak azt gyűjtjük, ami a Szolgáltatás működtetéséhez és a veled való kapcsolattartáshoz szükséges. Nem adjuk el az adataidat.","privacy-s2-t":"2. Milyen adatokat gyűjtünk","privacy-s2-b":"<ul><li>E-mail és választott nyelv — amikor feliratkozol az alfa várólistára;</li><li>Becenév és hash-elt jelszó — regisztrációkor;</li><li>Technikai adatok: böngésző, eszköz, hozzávetőleges hely IP alapján;</li><li>Névtelen látogatottsági statisztikák.</li></ul>","privacy-s3-t":"3. Hogyan használjuk az adatokat","privacy-s3-b":"<ul><li>Alfa meghívók és fontos frissítések küldése;</li><li>A Szolgáltatás üzemeltetése és fejlesztése;</li><li>Védelem csalások, spam és visszaélések ellen.</li></ul>","privacy-s4-t":"4. Tárolás és harmadik felek","privacy-s4-b":"A feliratkozási és fiók adatokat a Supabase-en keresztül tároljuk. A Discord és YouTube gombok külső szolgáltatásokra mutatnak, saját adatvédelmi szabályzattal.","privacy-s5-t":"5. Sütik és jogaid","privacy-s5-b":"Minimális sütit használunk — nyelv és bejelentkezés megjegyzésére. Hozzáférést, javítást vagy törlést kérhetsz az <a href=\"mailto:support@evades3.com\">support@evades3.com</a> címen.","privacy-s6-t":"6. Gyermekek","privacy-s6-b":"A Szolgáltatás nem 13 éven aluli gyermekeknek készült. Ha megtudjuk, hogy 13 éven aluli gyermektől származó adatokat kaptunk, töröljük azokat.","privacy-s7-t":"7. Változtatások és kapcsolat","privacy-s7-b":"Frissíthetjük ezt a szabályzatot. A folyamatos használat az aktuális verzió elfogadását jelenti. Kérdések: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Minden jog fenntartva.","footer-terms":"Felhasználási feltételek","footer-privacy":"Adatvédelmi szabályzat","footer-cookies":"Sütik","footer-support":"Támogatás","footer-contact":"Kérdésed van? Írj a <a href=\"mailto:support@evades3.com\">support@evades3.com</a> címre."},"el":{"html-lang":"el","back-home":"← Πίσω στην αρχική","languages-label":"Γλώσσα","effective-label":"Ισχύει από","effective-date":"23 Απριλίου 2026","toc-title":"Ενότητες","pick-language":"Επίλεξε γλώσσα","terms-title":"Όροι χρήσης","terms-subtitle":"Σύντομοι και ξεκάθαροι κανόνες για τη χρήση του ιστότοπου και του παιχνιδιού Evades 3.","terms-intro":"Παρακαλούμε διάβασε αυτούς τους Όρους προσεκτικά πριν χρησιμοποιήσεις το evades3.com και το παιχνίδι Evades 3 («Υπηρεσία»). Χρησιμοποιώντας την Υπηρεσία αποδέχεσαι αυτούς τους Όρους.","terms-s1-t":"1. Αποδοχή των όρων","terms-s1-b":"Επισκεπτόμενος τον ιστότοπο ή ξεκινώντας το παιχνίδι επιβεβαιώνεις ότι διάβασες και αποδέχεσαι αυτούς τους Όρους. Αν δεν συμφωνείς, μην χρησιμοποιείς την Υπηρεσία.","terms-s2-t":"2. Σχετικά με την Υπηρεσία και την άλφα φάση","terms-s2-b":"Το Evades 3 είναι ένα arcade παιχνίδι στον browser σε κλειστή άλφα. Χαρακτηριστικά, ισορροπία, αρένες και διαθεσιμότητα μπορεί να αλλάξουν ή να αφαιρεθούν χωρίς προειδοποίηση. Η πρόοδος μπορεί να μηδενιστεί.","terms-s3-t":"3. Ηλικία και λογαριασμοί","terms-s3-b":"Πρέπει να είσαι τουλάχιστον 13 ετών. Χρήστες κάτω των 18 χρειάζονται συναίνεση γονέα ή κηδεμόνα. Ευθύνεσαι για την ασφάλεια του λογαριασμού και του κωδικού σου.","terms-s4-t":"4. Αποδεκτή χρήση","terms-s4-b":"Απαγορεύεται: <ul><li>η χρήση cheats, bots, exploits ή λογισμικού τρίτων για πλεονέκτημα;</li><li>η παρενόχληση, ο εκφοβισμός ή το spam σε άλλους παίκτες;</li><li>η διατάραξη των διακομιστών ή η αντίστροφη μηχανική;</li><li>η δημιουργία πολλαπλών λογαριασμών για παράκαμψη bans.</li></ul>","terms-s5-t":"5. Πνευματική ιδιοκτησία","terms-s5-b":"Ο κώδικας, τα γραφικά, ο ήχος, το όνομα «Evades 3» και το λογότυπο ανήκουν στην ομάδα Evades 3. Αντιγραφή, μεταπώληση ή παράγωγα έργα απαιτούν γραπτή άδεια.","terms-s6-t":"6. Άλφα, «ως έχει», ευθύνη","terms-s6-b":"Η Υπηρεσία παρέχεται «ως έχει» χωρίς εγγυήσεις διαθεσιμότητας, διατήρησης δεδομένων ή συγκεκριμένων λειτουργιών. Στο βαθμό που επιτρέπει ο νόμος, η ομάδα δεν ευθύνεται για έμμεσες ή παρεπόμενες ζημιές.","terms-s7-t":"7. Αλλαγές και διακοπή","terms-s7-b":"Μπορούμε να ενημερώνουμε αυτούς τους Όρους. Η συνέχιση της χρήσης σημαίνει αποδοχή. Μπορούμε να αναστείλουμε ή να τερματίσουμε την πρόσβαση για παραβάσεις ή ανάγκες ανάπτυξης.","terms-s8-t":"8. Επικοινωνία","terms-s8-b":"Ερωτήσεις για αυτούς τους Όρους: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Πολιτική απορρήτου","privacy-subtitle":"Ποια δεδομένα συλλέγουμε, γιατί και πώς τα προστατεύουμε.","privacy-intro":"Αυτή η Πολιτική περιγράφει πώς ο ιστότοπος evades3.com και το παιχνίδι Evades 3 («Υπηρεσία») επεξεργάζονται προσωπικά δεδομένα.","privacy-s1-t":"1. Εισαγωγή","privacy-s1-b":"Σεβόμαστε το απόρρητό σου και συλλέγουμε μόνο ό,τι χρειάζεται για τη λειτουργία της Υπηρεσίας και την επικοινωνία. Δεν πουλάμε τα δεδομένα σου.","privacy-s2-t":"2. Δεδομένα που συλλέγουμε","privacy-s2-b":"<ul><li>Email και επιλεγμένη γλώσσα — όταν εγγράφεσαι στη λίστα άλφα;</li><li>Ψευδώνυμο και κρυπτογραφημένος κωδικός — κατά την εγγραφή;</li><li>Τεχνικά δεδομένα: browser, συσκευή, κατά προσέγγιση τοποθεσία από IP;</li><li>Ανώνυμα στατιστικά επισκέψεων.</li></ul>","privacy-s3-t":"3. Πώς χρησιμοποιούμε τα δεδομένα","privacy-s3-b":"<ul><li>Αποστολή προσκλήσεων άλφα και σημαντικών ενημερώσεων;</li><li>Λειτουργία και βελτίωση της Υπηρεσίας;</li><li>Προστασία από cheats, spam και κατάχρηση.</li></ul>","privacy-s4-t":"4. Αποθήκευση και τρίτοι","privacy-s4-b":"Τα δεδομένα εγγραφής και λογαριασμών αποθηκεύονται μέσω Supabase. Τα κουμπιά Discord και YouTube οδηγούν σε εξωτερικές υπηρεσίες με τις δικές τους πολιτικές.","privacy-s5-t":"5. Cookies και τα δικαιώματά σου","privacy-s5-b":"Χρησιμοποιούμε ελάχιστα cookies — για γλώσσα και σύνδεση. Μπορείς να ζητήσεις πρόσβαση, διόρθωση ή διαγραφή των δεδομένων σου στο <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Παιδιά","privacy-s6-b":"Η Υπηρεσία δεν προορίζεται για παιδιά κάτω των 13 ετών. Εάν μάθουμε ότι έχουμε δεδομένα από παιδί κάτω των 13 ετών, θα τα διαγράψουμε.","privacy-s7-t":"7. Αλλαγές και επικοινωνία","privacy-s7-b":"Μπορούμε να ενημερώνουμε αυτήν την Πολιτική. Η συνέχιση της χρήσης σημαίνει αποδοχή της τρέχουσας έκδοσης. Ερωτήσεις: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Με την επιφύλαξη παντός δικαιώματος.","footer-terms":"Όροι χρήσης","footer-privacy":"Πολιτική απορρήτου","footer-cookies":"Cookies","footer-support":"Υποστήριξη","footer-contact":"Έχεις ερωτήσεις; Γράψε μας στο <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"ja":{"html-lang":"ja","back-home":"← トップへ戻る","languages-label":"言語","effective-label":"施行日","effective-date":"2026年4月23日","toc-title":"セクション","pick-language":"言語を選択","terms-title":"利用規約","terms-subtitle":"Evades 3 のウェブサイトとゲームを利用するための、短く明確なルールです。","terms-intro":"evades3.com およびゲーム Evades 3（以下「本サービス」）をご利用になる前に、本規約を注意深くお読みください。本サービスを利用することで、本規約に同意したものとみなされます。","terms-s1-t":"1. 規約への同意","terms-s1-b":"サイトへのアクセスまたはゲームの起動により、本規約を読み、同意したことを確認するものとします。同意しない場合は、本サービスを利用しないでください。","terms-s2-t":"2. 本サービスとアルファ段階について","terms-s2-b":"Evades 3 は、クローズドアルファ段階にあるブラウザベースのアーケードゲームです。機能、バランス、アリーナ、利用可能性は事前の通知なく変更・削除される場合があります。進行状況はリセットされる可能性があります。","terms-s3-t":"3. 年齢とアカウント","terms-s3-b":"13 歳以上である必要があります。18 歳未満のユーザーは保護者の同意が必要です。アカウントとパスワードの安全はご自身で管理してください。","terms-s4-t":"4. 利用規則","terms-s4-b":"以下は禁止です： <ul><li>チート、ボット、エクスプロイト、サードパーティ製ソフトを使って有利を得ること；</li><li>他プレイヤーへの嫌がらせ、いじめ、スパム；</li><li>サーバーの妨害やリバースエンジニアリング；</li><li>BAN 回避のための複数アカウント作成。</li></ul>","terms-s5-t":"5. 知的財産権","terms-s5-b":"コード、グラフィック、サウンド、「Evades 3」の名称およびロゴは Evades 3 チームに帰属します。複製、再販、派生物の作成には書面による許可が必要です。","terms-s6-t":"6. アルファ、「現状のまま」、責任","terms-s6-b":"本サービスは、可用性、データ保持、特定の機能について保証なく「現状のまま」提供されます。法律で認められる範囲で、チームは間接的・付随的損害について責任を負いません。","terms-s7-t":"7. 変更および終了","terms-s7-b":"本規約を更新する場合があります。継続利用は同意とみなされます。違反や開発上の必要により、アクセスを停止・終了することがあります。","terms-s8-t":"8. お問い合わせ","terms-s8-b":"本規約に関するご質問は <a href=\"mailto:support@evades3.com\">support@evades3.com</a> まで。","privacy-title":"プライバシーポリシー","privacy-subtitle":"どのようなデータを、なぜ、どのように保護して扱うか。","privacy-intro":"本ポリシーは、evades3.com および Evades 3（「本サービス」）が個人情報をどう扱うかを説明します。","privacy-s1-t":"1. はじめに","privacy-s1-b":"プライバシーを尊重し、本サービスの運営と連絡に必要な情報のみを収集します。データを第三者に販売することはありません。","privacy-s2-t":"2. 収集する情報","privacy-s2-b":"<ul><li>メールアドレスと選択言語 — アルファ待機リスト登録時；</li><li>ニックネームとハッシュ化パスワード — アカウント登録時；</li><li>技術情報：ブラウザ、デバイス、IP から推定されるおおよその位置；</li><li>匿名の訪問統計。</li></ul>","privacy-s3-t":"3. 情報の利用目的","privacy-s3-b":"<ul><li>アルファ招待や重要なお知らせの送信；</li><li>本サービスの運営と改善；</li><li>チート、スパム、不正利用の防止。</li></ul>","privacy-s4-t":"4. 保管と第三者","privacy-s4-b":"登録・アカウント情報は Supabase 経由で保管されます。Discord と YouTube のボタンは、それぞれ独自のプライバシーポリシーを持つ外部サービスへのリンクです。","privacy-s5-t":"5. Cookie とあなたの権利","privacy-s5-b":"言語とログイン状態の保持のため、最小限の Cookie のみ使用します。データへのアクセス、訂正、削除は <a href=\"mailto:support@evades3.com\">support@evades3.com</a> までご連絡ください。","privacy-s6-t":"6. 子ども","privacy-s6-b":"本サービスは 13 歳未満を対象としていません。13 歳未満の情報を受け取ったと判明した場合は削除します。","privacy-s7-t":"7. 変更と連絡先","privacy-s7-b":"本ポリシーを更新する場合があります。継続利用は現行版への同意とみなされます。ご質問： <a href=\"mailto:support@evades3.com\">support@evades3.com</a>。","footer-copy":"© 2026 Evades 3. All rights reserved.","footer-terms":"利用規約","footer-privacy":"プライバシーポリシー","footer-cookies":"Cookie","footer-support":"サポート","footer-contact":"ご質問は <a href=\"mailto:support@evades3.com\">support@evades3.com</a> までお寄せください。"},"zh":{"html-lang":"zh","back-home":"← 返回首页","languages-label":"语言","effective-label":"生效日期","effective-date":"2026 年 4 月 23 日","toc-title":"章节","pick-language":"选择语言","terms-title":"服务条款","terms-subtitle":"使用 Evades 3 网站和游戏的简短、清晰规则。","terms-intro":"请在使用 evades3.com 网站和 Evades 3 游戏（以下简称\"本服务\"）之前仔细阅读这些条款。使用本服务即表示您同意这些条款。","terms-s1-t":"1. 接受条款","terms-s1-b":"访问网站或启动游戏即表示您已阅读并接受这些条款。如果您不同意，请勿使用本服务。","terms-s2-t":"2. 关于本服务及 Alpha 状态","terms-s2-b":"Evades 3 是一款处于封闭 Alpha 阶段的浏览器街机游戏。功能、平衡、竞技场和可用性可能会随时更改或删除，恕不另行通知。进度可能被重置。","terms-s3-t":"3. 年龄与账户","terms-s3-b":"您必须年满 13 周岁。未满 18 岁的用户需要获得父母或监护人的同意。您负责保管账户和密码的安全。","terms-s4-t":"4. 可接受的使用","terms-s4-b":"禁止以下行为：<ul><li>使用作弊、机器人、漏洞或第三方软件获得优势；</li><li>骚扰其他玩家、霸凌或发送垃圾信息；</li><li>干扰服务器或进行逆向工程；</li><li>创建多个账户以规避封禁。</li></ul>","terms-s5-t":"5. 知识产权","terms-s5-b":"代码、图像、声音、\"Evades 3\" 名称和标志归 Evades 3 团队所有。未经书面许可，不得复制、转售或创建衍生作品。","terms-s6-t":"6. Alpha，\"按原样\"，责任","terms-s6-b":"本服务按\"原样\"提供，不对可用性、数据保留或特定功能作保证。在法律允许的范围内，团队不对间接或偶然损害负责。","terms-s7-t":"7. 变更与终止","terms-s7-b":"我们可能更新这些条款。继续使用即视为接受。我们可能因违规或开发需要而暂停或终止访问。","terms-s8-t":"8. 联系我们","terms-s8-b":"关于这些条款的问题：<a href=\"mailto:support@evades3.com\">support@evades3.com</a>。","privacy-title":"隐私政策","privacy-subtitle":"我们收集哪些数据、为什么以及如何保护。","privacy-intro":"本政策说明 evades3.com 网站和 Evades 3 游戏（\"本服务\"）如何处理个人数据。","privacy-s1-t":"1. 介绍","privacy-s1-b":"我们尊重您的隐私，仅收集运营本服务和与您沟通所需的信息。我们不会出售您的数据。","privacy-s2-t":"2. 我们收集的数据","privacy-s2-b":"<ul><li>电子邮件和选择的语言——当您加入 Alpha 候补名单时；</li><li>昵称和经过哈希处理的密码——当您注册账户时；</li><li>技术数据：浏览器、设备、基于 IP 的大致位置；</li><li>匿名访问统计。</li></ul>","privacy-s3-t":"3. 我们如何使用数据","privacy-s3-b":"<ul><li>发送 Alpha 邀请和重要更新；</li><li>运行和改进本服务；</li><li>防止作弊、垃圾信息和滥用。</li></ul>","privacy-s4-t":"4. 存储与第三方","privacy-s4-b":"订阅和账户数据通过 Supabase 存储。Discord 和 YouTube 按钮链接到拥有各自隐私政策的外部服务。","privacy-s5-t":"5. Cookie 和您的权利","privacy-s5-b":"我们仅使用最少的 Cookie，用于记住语言和登录状态。您可以通过写信至 <a href=\"mailto:support@evades3.com\">support@evades3.com</a> 来请求访问、更正或删除您的数据。","privacy-s6-t":"6. 儿童","privacy-s6-b":"本服务不面向 13 岁以下的儿童。如果我们发现收到了 13 岁以下儿童的数据，我们将予以删除。","privacy-s7-t":"7. 变更与联系","privacy-s7-b":"我们可能更新本政策。继续使用即视为接受当前版本。有问题？<a href=\"mailto:support@evades3.com\">support@evades3.com</a>。","footer-copy":"© 2026 Evades 3。保留所有权利。","footer-terms":"服务条款","footer-privacy":"隐私政策","footer-cookies":"Cookie","footer-support":"支持","footer-contact":"有问题吗？请写信给我们：<a href=\"mailto:support@evades3.com\">support@evades3.com</a>。"},"ko":{"html-lang":"ko","back-home":"← 메인으로 돌아가기","languages-label":"언어","effective-label":"시행일","effective-date":"2026년 4월 23일","toc-title":"섹션","pick-language":"언어 선택","terms-title":"이용약관","terms-subtitle":"Evades 3 웹사이트와 게임 이용을 위한 간단하고 명확한 규칙입니다.","terms-intro":"evades3.com과 Evades 3 게임(\"서비스\")을 사용하기 전에 본 약관을 주의 깊게 읽어 주세요. 서비스를 이용하면 본 약관에 동의하는 것으로 간주됩니다.","terms-s1-t":"1. 약관 동의","terms-s1-b":"사이트 방문 또는 게임 실행으로 본 약관을 읽고 수락했음을 확인합니다. 동의하지 않는 경우 서비스를 이용하지 마세요.","terms-s2-t":"2. 서비스 및 알파 상태에 대하여","terms-s2-b":"Evades 3는 비공개 알파 단계의 브라우저 아케이드 게임입니다. 기능, 밸런스, 아레나, 가용성은 사전 예고 없이 변경되거나 삭제될 수 있습니다. 진행 상황이 초기화될 수 있습니다.","terms-s3-t":"3. 연령 및 계정","terms-s3-b":"만 13세 이상이어야 합니다. 18세 미만은 부모 또는 보호자의 동의가 필요합니다. 계정과 비밀번호의 보안은 본인이 책임집니다.","terms-s4-t":"4. 허용되는 사용","terms-s4-b":"다음은 금지됩니다: <ul><li>치트, 봇, 익스플로잇 또는 제3자 소프트웨어를 사용하여 이점을 얻는 행위;</li><li>다른 플레이어에 대한 괴롭힘, 폭력 또는 스팸;</li><li>서버 방해 또는 리버스 엔지니어링 시도;</li><li>차단 회피를 위한 여러 계정 생성.</li></ul>","terms-s5-t":"5. 지적 재산권","terms-s5-b":"코드, 그래픽, 사운드, \"Evades 3\" 이름 및 로고는 Evades 3 팀의 소유입니다. 서면 허가 없이 복제, 재판매 또는 파생 작품을 만들 수 없습니다.","terms-s6-t":"6. 알파, \"있는 그대로\", 책임","terms-s6-b":"서비스는 가용성, 데이터 보존 또는 특정 기능에 대한 보증 없이 \"있는 그대로\" 제공됩니다. 법이 허용하는 최대 범위 내에서 팀은 간접적이거나 부수적인 손해에 대해 책임을 지지 않습니다.","terms-s7-t":"7. 변경 및 종료","terms-s7-b":"본 약관을 업데이트할 수 있습니다. 계속 사용하면 수락한 것으로 간주됩니다. 위반이나 개발 필요에 따라 접근을 중단하거나 종료할 수 있습니다.","terms-s8-t":"8. 문의","terms-s8-b":"본 약관에 대한 문의는 <a href=\"mailto:support@evades3.com\">support@evades3.com</a>로 보내주세요.","privacy-title":"개인정보처리방침","privacy-subtitle":"어떤 데이터를 수집하고, 왜, 어떻게 보호하는지.","privacy-intro":"본 방침은 evades3.com과 Evades 3 게임(\"서비스\")이 개인정보를 어떻게 처리하는지 설명합니다.","privacy-s1-t":"1. 소개","privacy-s1-b":"귀하의 프라이버시를 존중하며, 서비스 운영과 연락에 필요한 정보만 수집합니다. 데이터를 판매하지 않습니다.","privacy-s2-t":"2. 수집하는 데이터","privacy-s2-b":"<ul><li>이메일 및 선택한 언어 — 알파 대기 명단 등록 시;</li><li>닉네임과 해시 처리된 비밀번호 — 계정 등록 시;</li><li>기술 데이터: 브라우저, 장치, IP 기반 대략적인 위치;</li><li>익명 방문 통계.</li></ul>","privacy-s3-t":"3. 데이터 사용 방법","privacy-s3-b":"<ul><li>알파 초대 및 중요한 업데이트 발송;</li><li>서비스 운영 및 개선;</li><li>치트, 스팸 및 남용 방지.</li></ul>","privacy-s4-t":"4. 저장 및 제3자","privacy-s4-b":"구독 및 계정 데이터는 Supabase를 통해 저장됩니다. Discord 및 YouTube 버튼은 각자의 방침을 가진 외부 서비스로 연결됩니다.","privacy-s5-t":"5. 쿠키 및 귀하의 권리","privacy-s5-b":"언어와 로그인 상태 기억을 위해 최소한의 쿠키만 사용합니다. <a href=\"mailto:support@evades3.com\">support@evades3.com</a>으로 연락하여 데이터 접근, 수정 또는 삭제를 요청할 수 있습니다.","privacy-s6-t":"6. 어린이","privacy-s6-b":"서비스는 13세 미만 어린이를 대상으로 하지 않습니다. 13세 미만 어린이의 데이터를 받았다는 사실을 알게 되면 삭제하겠습니다.","privacy-s7-t":"7. 변경 및 연락처","privacy-s7-b":"본 방침을 업데이트할 수 있습니다. 계속 사용하면 현재 버전에 동의하는 것입니다. 문의: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. 모든 권리 보유.","footer-terms":"이용약관","footer-privacy":"개인정보처리방침","footer-cookies":"쿠키","footer-support":"지원","footer-contact":"문의가 있으신가요? <a href=\"mailto:support@evades3.com\">support@evades3.com</a>으로 보내주세요."},"ar":{"html-lang":"ar","back-home":"← العودة إلى الرئيسية","languages-label":"اللغة","effective-label":"يسري من","effective-date":"23 أبريل 2026","toc-title":"الأقسام","pick-language":"اختر لغة","terms-title":"شروط الخدمة","terms-subtitle":"قواعد قصيرة وواضحة لاستخدام موقع ولعبة Evades 3.","terms-intro":"يرجى قراءة هذه الشروط بعناية قبل استخدام موقع evades3.com ولعبة Evades 3 («الخدمة»). باستخدام الخدمة، فإنك تو रू करके आप पुष्टि करते हैं कि आपने इन शर्तों को पढ़ लिया है और स्वीकार कर लिया है। यदि आप सहमत नहीं हैं, तो सेवा का उपयोग न करें।","terms-s2-t":"2. सेवा और अल्फा स्थिति के बारे में","terms-s2-b":"Evades 3 एक क्लोज़्ड अल्फा में चल रहा ब्राउज़र-आधारित आर्केड गेम है। सुविधाएँ, बैलेंस, एरिना और उपलब्धता बिना सूचना के बदल या हटाई जा सकती हैं। प्रगति रीसेट हो सकती है।","terms-s3-t":"3. आयु और खाते","terms-s3-b":"आपकी आयु कम से कम 13 वर्ष होनी चाहिए। 18 वर्ष से कम उम्र के उपयोगकर्ताओं को माता-पिता या अभिभावक की सहमति की आवश्यकता है। खाते और पासवर्ड की सुरक्षा की जिम्मेदारी आपकी है।","terms-s4-t":"4. स्वीकार्य उपयोग","terms-s4-b":"प्रतिबंधित: <ul><li>चीट, बॉट, एक्सप्लॉइट या तृतीय-पक्ष सॉफ़्टवेयर का उपयोग करके लाभ लेना;</li><li>अन्य खिलाड़ियों को परेशान करना, बुलिंग या स्पैम;</li><li>सर्वरों को बाधित करने या रिवर्स-इंजीनियरिंग का प्रयास;</li><li>प्रतिबंधों से बचने के लिए कई खाते बनाना।</li></ul>","terms-s5-t":"5. बौद्धिक संपदा","terms-s5-b":"कोड, ग्राफ़िक्स, ध्वनि, नाम \"Evades 3\" और लोगो Evades 3 टीम के हैं। लिखित अनुमति के बिना प्रतिलिपि, पुनर्विक्रय या व्युत्पन्न कार्य की अनुमति नहीं है।","terms-s6-t":"6. अल्फा, \"जैसा है\", दायित्व","terms-s6-b":"सेवा \"जैसी है\" आधार पर उपलब्धता, डेटा संरक्षण या विशिष्ट सुविधाओं की गारंटी के बिना प्रदान की जाती है। कानून द्वारा अनुमत सीमा तक टीम अप्रत्यक्ष या आकस्मिक नुकसान के लिए जिम्मेदार नहीं है।","terms-s7-t":"7. परिवर्तन और समाप्ति","terms-s7-b":"हम इन शर्तों को अपडेट कर सकते हैं। उपयोग जारी रखना स्वीकृति मानी जाएगी। हम उल्लंघन या विकास की आवश्यकताओं के लिए पहुँच को निलंबित या समाप्त कर सकते हैं।","terms-s8-t":"8. संपर्क","terms-s8-b":"इन शर्तों के बारे में प्रश्न: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"गोपनीयता नीति","privacy-subtitle":"हम कौन सा डेटा एकत्र करते हैं, क्यों, और कैसे सुरक्षित रखते हैं।","privacy-intro":"यह नीति बताती है कि evades3.com वेबसाइट और Evades 3 गेम (\"सेवा\") व्यक्तिगत डेटा को कैसे संभालते हैं।","privacy-s1-t":"1. परिचय","privacy-s1-b":"हम आपकी गोपनीयता का सम्मान const LANGS = [["ru","RUS"],["en","ENG"],["uk","UKR"],["de","DEU"],["es","ESP"],["fr","FRA"],["it","ITA"],["pt","POR"],["pl","POL"],["tr","TUR"],["nl","NLD"],["sv","SWE"],["no","NOR"],["fi","FIN"],["da","DAN"],["cs","CES"],["ro","RON"],["hu","HUN"],["el","ELL"],["ja","JPN"],["zh","ZHO"],["ko","KOR"],["ar","ARA"],["hi","HIN"],["th","THA"],["vi","VIE"],["id","IND"],["ms","MSA"]];
const RTL = new Set(['ar','he','fa','ur']);

function getLang(){
  const saved = localStorage.getItem('selectedLanguage') || localStorage.getItem('lang');
  if (saved && I18N[saved]) return saved;
  const b = (navigator.language || 'en').slice(0,2);
  return I18N[b] ? b : 'en';
}

function apply(lang){
  const t = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.documentElement.dir = RTL.has(lang) ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    const v = t[k] || (I18N.en && I18N.en[k]) || '';
    const attr = el.getAttribute('data-i18n-attr');
    if (attr) el.setAttribute(attr, v.replace(/<[^>]+>/g,''));
    else el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const k = el.getAttribute('data-i18n-html');
    el.innerHTML = (t[k] || (I18N.en && I18N.en[k]) || '');
  });
  // Language button label
  const entry = LANGS.find(l => l[0] === lang);
  if (entry) document.getElementById('langCurrent').textContent = entry[1];
  document.querySelectorAll('.lang-option').forEach(o => {
    o.classList.toggle('is-active', o.getAttribute('data-lang') === lang);
  });
  // Title meta
  document.title = (t[document.documentElement.dataset.page + '-title'] || 'Evades 3') + ' · Evades 3';
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('langBtn');
  const menu = document.getElementById('langMenu');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
    btn.setAttribute('aria-expanded', menu.classList.contains('open'));
  });
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('open');
  });
  document.querySelectorAll('.lang-option').forEach(o => {
    o.addEventListener('click', () => {
      const code = o.getAttribute('data-lang');
      localStorage.setItem('selectedLanguage', code);
      localStorage.setItem('lang', code);
      menu.classList.remove('open');
      apply(code);
    });
  });
  apply(getLang());
});
