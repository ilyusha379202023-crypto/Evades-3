.bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}
.bg-stars::before,.bg-stars::after{

  background-size:64px 64px;animation:drift 120s linear infinite;
}
.bg-stars::after{background-size:96px 96px;opacity:.4;animation-duration:200s;animation-direction:reverse}
@keyframes drift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-64px,-64px,0)}}

header.topbar{

а косвенный или случайный ущерб.","terms-s7-t":"7. Изменения и прекращение","terms-s7-b":"Мы можем обновлять эти Условия. Продолжая пользоваться Сервисом после изменений, вы их принимаете. Мы можем приостановить или закрыть доступ при нарушениях или по причинам разработки.","terms-s8-t":"8. Контакт","terms-s8-b":"Вопросы по этим Условиям — на <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Политика конфиденциальности","privacy-subtitle":"Какие данные мы собираем, зачем и как их защищаем.","privacy-intro":"Эта Политика описывает, как сайт evades3.com и игра Evades 3 («Сервис») обрабатывают персональные данные.","privacy-s1-t":"1. Введение","privacy-s1-b":"Мы уважаем вашу приватность и собираем только то, что нужно для работы Сервиса и связи с вами. Данные не продаются третьим лицам.","privacy-s2-t":"2. Какие данные мы собираем","privacy-s2-b":"<ul><li>Email и выбранный язык — когда вы подписываетесь в очередь альфа-теста;</li><li>Ник и хешированный пароль — при регистрации аккаунта;</li><li>Технические данные: тип браузера, устройство, приблизительное местоположение по IP;</li><li>Базовая аналитика посещений (без привязки к личности).</li></ul>","privacy-s3-t":"3. Как мы используем данные","privacy-s3-b":"<ul><li>Отправка приглашений в альфа-тест и важных новостей;</li><li>Работа и улучшение Сервиса;</li><li>Защита от читов, спама и злоупотреблений.</li></ul>","privacy-s4-t":"4. Хранение и третьи стороны","privacy-s4-b":"Данные подписок и аккаунтов хранятся через Supabase. Кнопки Discord и YouTube — ссылки на внешние сервисы с их политиками конфиденциальности.","privacy-s5-t":"5. Cookies и ваши права","privacy-s5-b":"Мы используем минимум cookies — для запоминания языка и входа. Вы можете запросить доступ к своим данным, их исправление или удаление, написав на <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Дети","privacy-s6-b":"Сервис не предназначен для детей младше 13 лет. Если мы узнаем, что по ount data are stored via Supabase. The Discord and YouTube buttons link to external services with their own privacy policies.","privacy-s5-t":"5. Cookies and your rights","privacy-s5-b":"We use a minimum of cookies — for remembering your language and login. You can request access, correction or deletion of your data by writing to <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Children","privacy-s6-b":"The Service is not intended for children under 13. If we learn we have received data from a child under 13, we will delete it.","privacy-s7-t":"7. Changes and contact","privacy-s7-b":"We may update this Policy. Continued use of the Service means you accept the current version. Questions — <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. All rights reserved.","footer-terms":"Terms of Service","footer-privacy":"Privacy Policy","footer-cookies":"Cookies","footer-support":"Support","footer-contact":"Questions? Write to <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"uk":{"html-lang":"uk","back-home":"← На головну","languages-label":"Мова","effective-label":"Діє з","effective-date":"23 квітня 2026","toc-title":"Розділи","pick-language":"Обери мову","terms-title":"Умови використання","terms-subtitle":"Короткі та зрозумілі правила користування сайтом і грою Evades 3.","terms-intro":"Будь ласка, уважно прочитай ці Умови перед використанням сайту evades3.com і гри Evades 3 («Сервіс»). Користуючись Сервісом, ти погоджуєшся з цими Умовами.","terms-s1-t":"1. Прийняття умов","terms-s1-b":"Відвідуючи сайт або запускаючи гру, ти підтверджуєш, що прочитав і приймаєш ці Умови. Якщо не згоден — не використовуй Сервіс.","terms-s2-t":"2. Про Сервіс і статус альфи","terms-s2-b":"Evades 3 — браузерна аркада, що перебуває в закритій альфі. Функції, баланс, арени і доступність можуть змінюватись або видалятись без попередження. Прогрес може бути скинуто.","terms-s3-t":"3. Вік і облікові записи","terms-s3-b":"Користуватися Сервісом можуть особи від 13 років. Особам до 18 років потрібна згода батьків або опікунів. Ти відповідаєш за безпеку свого акаунту та пароля.","terms-s4-t":"4. Правила поведінки","terms-s4-b":"Заборонено: <ul><li>використовувати чити, боти, експлойти чи стороннє ПЗ для переваги;</li><li>ображати гравців, цькувати або спамити;</li><li>намагатись порушити роботу серверів або займатись реверс-інжинірингом;</li><li>створювати кілька акаунтів для обходу блокувань.</li></ul>","terms-s5-t":"5. Інтелектуальна власність","terms-s5-b":"Код, графіка, звук, назва «Evades 3» і логотип належать команді Evades 3. Копіювання, перепродаж або створення похідних робіт без письмового дозволу заборонені.","terms-s6-t":"6. Альфа, «як є», відповідальність","terms-s6-b":"Сервіс надається «як є», без гарантій працездатності, збереження даних чи конкретних функцій. У межах, дозволених законом, команда Evades 3 не несе відповідальності за непрямі або випадкові збитки.","terms-s7-t":"7. Зміни і припинення","terms-s7-b":"Ми можемо оновлювати ці Умови. Подальше користування Сервісом означає прийняття змін. Ми можемо призупинити або закрити доступ у разі порушень чи з потреб розробки.","terms-s8-t":"8. Контакт","terms-s8-b":"Питання за цими Умовами — на <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Політика конфіденційності","privacy-subtitle":"Які дані ми збираємо, навіщо й як їх захищаємо.","privacy-intro":"Ця Політика описує, як сайт evades3.com і гра Evades 3 («Сервіс») обробляють персональні дані.","privacy-s1-t":"1. Вступ","privacy-s1-b":"Ми поважаємо твою приватність і збираємо лише те, що потрібно для роботи Сервісу й зв'язку з тобою. Дані не продаються третім особам.","privacy-s2-t":"2. Які дані ми збираємо","privacy-s2-b":"<ul><li>Email і вибрану мову — коли ти стаєш у чергу на альфа-тест;</li><li>Нік і хешований пароль — під час реєстрації акаунту;</li><li>Технічні дані: браузер, пристрій, приблизне розташування за IP;</li><li>Базова анонімна аналітика відвідувань.</li></ul>","privacy-s3-t":"3. Як ми використовуємо дані","privacy-s3-b":"<ul><li>Надсилання запрошень в альфа-тест і важливих новин;</li><li>Робота й покращення Сервісу;</li><li>Захист від читів, спаму і зловживань.</li></ul>","privacy-s4-t":"4. Зберігання і треті сторони","privacy-s4-b":"Дані підписок і акаунтів зберігаються через Supabase. Кнопки Discord та YouTube — посилання на зовнішні сервіси з їхніми політиками конфіденційності.","privacy-s5-t":"5. Cookies і твої права","privacy-s5-b":"Ми використовуємо мінімум cookies — для запам'ятовування мови та входу. Ти можеш запросити доступ до своїх даних, їх виправлення чи видалення, написавши на <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Діти","privacy-s6-b":"Сервіс не призначений для дітей до 13 років. Якщо ми дізнаємось, що отримали дані від дитини до 13 років, вони будуть видалені.","privacy-s7-t":"7. Зміни і контакт","privacy-s7-b":"Ми можемо оновлювати цю Політику. Подальше користування Сервісом означає прийняття актуальної версії. Питання — <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Усі права захищені.","footer-terms":"Умови використання","footer-privacy":"Політика конфіденційності","footer-cookies":"Cookies","footer-support":"Підтримка","footer-contact":"Є питання? Пишіть на <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"de":{"html-lang":"de","back-home":"← Zur Startseite","languages-label":"Sprache","effective-label":"Gültig ab","effective-date":"23. April 2026","toc-title":"Abschnitte","pick-language":"Sprache auswählen","terms-title":"Nutzungsbedingungen","terms-subtitle":"Kurze, klare Regeln für die Nutzung der Evades-3-Website und des Spiels.","terms-intro":"Bitte lies diese Bedingungen sorgfältig, bevor du evades3.com und das Spiel Evades 3 (den „Dienst\") nutzt. Mit der Nutzung stimmst du diesen Bedingungen zu.","terms-s1-t":"1. Annahme der n, wofür, und wie wir sie schützen.","privacy-intro":"Diese Erklärung beschreibt, wie evades3.com und das Spiel Evades 3 (der „Dienst\") personenbezogene Daten verarbeiten.","privacy-s1-t":"1. Einführung","privacy-s1-b":"Wir respektieren deine Privatsphäre und erfassen nur, was für den Betrieb des Dienstes und die Kommunikation nötig ist. Wir verkaufen deine Daten nicht.","privacy-s2-t":"2. Welche Daten wir erfassen","privacy-s2-b":"<ul><li>E-Mail und gewählte Sprache — wenn du dich auf die Alpha-Warteliste setzt;</li><li>Nickname und gehashtes Passwort — bei der Registrierung;</li><li>Technische Daten: Browser, Gerät, ungefährer Standort anhand der IP;</li><li>Anonyme Besuchsstatistiken.</li></ul>","privacy-s3-t":"3. Wozu wir Daten nutzen","privacy-s3-b":"<ul><li>Versand von Alpha-Einladungen und wichtigen Updates;</li><li>Betrieb und Verbesserung des Dienstes;</li><li>Schutz vor Cheats, Spam und Missbrauch.</li></ul>","privacy-s4-t":"4. Speicherung und Drittanbieter","privacy-s4-b":"Abonnement- und Kontodaten werden über Supabase gespeichert. Die Discord- und YouTube-Buttons verlinken auf externe Dienste mit eigenen Datenschutzrichtlinien.","privacy-s5-t":"5. Cookies und deine Rechte","privacy-s5-b":"Wir verwenden nur wenige Cookies — für Sprache und Login. Du kannst Auskunft, Berichtigung oder Löschung deiner Daten anfordern, indem du an <a href=\"mailto:support@evades3.com\">support@evades3.com</a> schreibst.","privacy-s6-t":"6. Kinder","privacy-s6-b":"Der Dienst ist nicht für Kinder unter 13 bestimmt. Sollten wir Daten eines Kindes unter 13 erhalten, löschen wir sie.","privacy-s7-t":"7. Änderungen und Kontakt","privacy-s7-b":"Wir können diese Richtlinie aktualisieren. Weitere Nutzung gilt als Annahme der aktuellen Version. Fragen: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Alle Rechte vorbehalten.","footer-terms":"Nutzungsbedingungen","footer-privacy":"Datenschutzerklärung","footer-cookies":"Cookies","footer-support":"Support","footer-contact":"Fragen? Schreib uns an <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"es":{"html-lang":"es","back-home":"← Volver al inicio","languages-label":"Idioma","effective-label":"Vigente desde","effective-date":"23 de abril de 2026","toc-title":"Secciones","pick-language":"Elige un idioma","terms-title":"Términos de servicio","terms-subtitle":"Reglas cortas y claras para usar el sitio y el juego Evades 3.","terms-intro":"Por favor, lee estos Términos con atención antes de usar evades3.com y el juego Evades 3 (el «Servicio»). Al usar el Servicio aceptas estos Términos.","terms-s1-t":"1. Aceptación de los términos","terms-s1-b":"Al visitar el sitio o iniciar el juego confirmas que has leído y aceptas estos Términos. Si no estás de acuerdo, no utilices el Servicio.","terms-s2-t":"2. Sobre el Servicio y la fase alfa","terms-s2-b":"Evades 3 es un juego arcade de navegador en alfa cerrada. Las funciones, el balance, las arenas y la disponibilidad pueden cambiar o retirarse sin previo aviso. El progreso puede reiniciarse.","terms-s3-t":"3. Edad y cuentas","terms-s3-b":"Debes tener al menos 13 años. Los menores de 18 necesitan el consentimiento de sus padres o tutores. Eres responsable de la seguridad de tu cuenta y contraseña.","terms-s4-t":"4. Uso aceptable","terms-s4-b":"No está permitido: <ul><li>usar trampas, bots, exploits o software de terceros para obtener ventaja;</li><li>acosar a otros jugadores, hacer bullying o spam;</li><li>interferir con los servidores o hacer ingeniería inversa;</li><li>crear varias cuentas para evitar sanciones.</li></ul>","terms-s5-t":"5. Propiedad intelectual","terms-s5-b":"El código, los gráficos, el sonido, el nombre «Evades 3» y el logotipo pertenecen al equipo de Evades 3. No se permite copiar, revender ni crear obras derivadas sin permiso por escrito.","terms-s6-t":"6. Alfa, «tal cual», responsabilidad","terms-s6-b":"El Servicio se ofrece «tal cual», sin garantías de disponibilidad, conservación de datos ni funciones específicas. En la medida que la ley lo permita, el equipo no responde por daños indirectos o incidentales.","terms-s7-t":"7. Cambios y terminación","terms-s7-b":"Podemos actualizar estos Términos. El uso continuado implica su aceptación. Podemos suspender o cerrar el acceso por infracciones o por necesidades de desarrollo.","terms-s8-t":"8. Contacto","terms-s8-b":"Preguntas sobre estos Términos: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Política de privacidad","privacy-subtitle":"Qué datos recopilamos, para qué y cómo los protegemos.","privacy-intro":"Esta Política describe cómo evades3.com y el juego Evades 3 (el «Servicio») tratan los datos personales.","privacy-s1-t":"1. Introducción","privacy-s1-b":"Respetamos tu privacidad y solo recogemos lo necesario para operar el Servicio y comunicarnos contigo. No vendemos tus datos a terceros.","privacy-s2-t":"2. Datos que recogemos","privacy-s2-b":"<ul><li>Correo electrónico e idioma elegido — al unirte a la lista alfa;</li><li>Apodo y contraseña con hash — al registrarte;</li><li>Datos técnicos: navegador, dispositivo, ubicación aproximada por IP;</li><li>Analítica anónima de visitas.</li></ul>","privacy-s3-t":"3. Cómo usamos los datos","privacy-s3-b":"<ul><li>Enviar invitaciones a la alfa y novedades importantes;</li><li>Operar y mejorar el Servicio;</li><li>Proteger contra trampas, spam y abusos.</li></ul>","privacy-s4-t":"4. Almacenamiento y terceros","privacy-s4-b":"Los datos de suscripción y cuentas se guardan mediante Supabase. Los botones de Discord y YouTube enlazan a servicios externos con sus propias políticas.","privacy-s5-t":"5. Cookies y tus derechos","privacy-s5-b":"Usamos un mínimo de cookies — para recordar el idioma y la sesión. Puedes solicitar acceso, corrección o eliminación de tus datos escribiendo a <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Menores","privacy-s6-b":"El Servicio no está dirigido a menores de 13 años. Si descubrimos que hemos recibido datos de un menor de 13 años, los eliminaremos.","privacy-s7-t":"7. Cambios y contacto","privacy-s7-b":"Podemos actualizar esta Política. El uso continuado implica la aceptación de la versión vigente. Preguntas: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Todos los derechos reservados.","footer-terms":"Términos de servicio","footer-privacy":"Política de privacidad","footer-cookies":"Cookies","footer-support":"Soporte","footer-contact":"¿Preguntas? Escríbenos a <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"fr":{"html-lang":"fr","back-home":"← Retour à l'accueil","languages-label":"Langue","effective-label":"En vigueur le","effective-date":"23 avril 2026","toc-title":"Sections","pick-language":"Choisis une langue","terms-title":"Conditions d'utilisation","terms-subtitle":"Règles courtes et claires pour utiliser le site et le jeu Evades 3.","terms-intro":"Merci de lire ces Conditions avec attention avant d'utiliser evades3.com et le jeu Evades 3 (le « Service »). En utilisant le Service, tu acceptes ces Conditions.","terms-s1-t":"1. Acceptation des conditions","terms-s1-b":"En visitant le site ou en lançant le jeu, tu confirmes avoir lu et accepté ces Conditions. Si tu n'es pas d'accord, n'utilise pas le Service.","terms-s2-t":"2. À propos du Service et de l'alpha","terms-s2-b":"Evades 3 est un jeu d'arcade navigateur en alpha fermée. Les fonctionnalités, l'équilibrage, les arènes et la disponibilité peuvent changer ou disparaître sans préavis. La progression peut être réinitialisée.","terms-s3-t":"3. Âge et comptes","terms-s3-b":"Tu dois avoir au moins 13 ans. Les utilisateurs de moins de 18 ans doivent obtenir le consentement d'un parent ou tuteur. Tu es responsable de la sécurité de ton compte et de ton mot de passe.","terms-s4-t":"4. Usage acceptable","terms-s4-b":"Sont interdits : <ul><li>tricheries, bots, exploits ou logiciels tiers pour obtenir un avantage ;</li><li>harcèlement, intimidation ou spam envers les autres joueurs ;</li><li>tentatives de perturber les serveurs ou de rétro-ingénierie ;</li><li>créer plusieurs comptes pour contourner les sanctions.</li></ul>","terms-s5-t":"5. Propriété intellectuelle","terms-s5-b":"Le code, les graphismes, le son, le nom « Evades 3 » et le logo appartiennent à l'équipe Evades 3. Toute copie, revente ou œuvre dérivée nécessite une autorisation écrite.","terms-s6-t":"6. Alpha, « en l'état », responsabilité","terms-s6-b":"Le Service est fourni « en l'état », sans garantie de disponibilité, de conservation des données ou de fonctionnalités précises. Dans la limite de la loi, l'équipe n'est pas responsable des dommages indirects ou accessoires.","terms-s7-t":"7. Modifications et résiliation","terms-s7-b":"Nous pouvons mettre à jour ces Conditions. La poursuite de l'utilisation vaut acceptation. Nous pouvons suspendre ou clôturer l'accès en cas d'infractions ou pour des besoins de développement.","terms-s8-t":"8. Contact","terms-s8-b":"Questions sur ces Conditions : <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Politique de confidentialité","privacy-subtitle":"Quelles données nous collectons, pourquoi, et comment nous les protégeons.","privacy-intro":"Cette Politique décrit comment evades3.com et le jeu Evades 3 (le « Service ») traitent les données personnelles.","privacy-s1-t":"1. Introduction","privacy-s1-b":"Nous respectons ta vie privée et ne collectons que ce qui est nécessaire pour faire fonctionner le Service et communiquer avec toi. Nous ne vendons pas tes données.","privacy-s2-t":"2. Données collectées","privacy-s2-b":"<ul><li>E-mail et langue choisie — lors de l'inscription à l'alpha ;</li><li>Pseudo et mot de passe haché — lors de la création de compte ;</li><li>Données techniques : navigateur, appareil, localisation approximative par IP ;</li><li>Statistiques anonymes de visite.</li></ul>","privacy-s3-t":"3. Utilisation des données","privacy-s3-b":"<ul><li>Envoyer les invitations à l'alpha et des actualités importantes ;</li><li>Faire fonctionner et améliorer le Service ;</li><li>Protéger contre la triche, le spam et les abus.</li></ul>","privacy-s4-t":"4. Stockage et tiers","privacy-s4-b":"Les données d'inscription et de compte sont stockées via Supabase. Les boutons Discord et YouTube renvoient vers des services externes avec leurs propres politiques.","privacy-s5-t":"5. Cookies et tes droits","privacy-s5-b":"Nous utilisons un minimum de cookies — pour la langue et la session. Tu peux demander l'accès, la rectification ou la suppression de tes données en écrivant à <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Enfants","privacy-s6-b":"Le Service n'est pas destiné aux enfants de moins de 13 ans. Si nous découvrons avoir reçu des données d'un enfant de moins de 13 ans, elles seront supprimées.","privacy-s7-t":"7. Modifications et contact","privacy-s7-b":"Nous pouvons mettre à jour cette Politique. La poursuite de l'utilisation vaut acceptation de la version en vigueur. Questions : <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Tous droits réservés.","footer-terms":"Conditions d'utilisation","footer-privacy":"Politique de confidentialité","footer-cookies":"Cookies","footer-support":"Support","footer-contact":"Des questions ? Écris-nous à <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"it":{"html-lang":"it","back-home":"← Torna alla home","languages-label":"Lingua","effective-label":"In vigore dal","effective-date":"23 aprile 2026","toc-title":"Sezioni","pick-language":"Scegli una lingua","terms-title":"Termini di servizio","terms-subtitle":"Regole brevi e chiare per usare il sito e il gioco Evades 3.","terms-intro":"Leggi questi Termini con attenzione prima di usare evades3.com e il gioco Evades 3 (il «Servizio»). Utilizzando il Servizio accetti questi Termini.","terms-s1-t":"1. Accettazione dei termini","terms-s1-b":"Visitando il sito o avviando il gioco confermi di aver letto e accettato questi Termini. Se non sei d'accordo, non utilizzare il Servizio.","terms-s2-t":"2. Il Servizio e lo stato alpha","terms-s2-b":"Evades 3 è un gioco arcade browser in alpha chiusa. Funzionalità, bilanciamento, arene e disponibilità possono cambiare o essere rimossi senza preavviso. I progressi possono essere azzerati.","terms-s3-t":"3. Età e account","terms-s3-b":"Devi avere almeno 13 anni. Gli utenti minorenni devono ottenere il consenso di un genitore o tutore. Sei responsabile della sicurezza del tuo account e della password.","terms-s4-t":"4. Uso consentito","terms-s4-b":"Non è consentito: <ul><li>usare cheat, bot, exploit o software di terze parti per ottenere vantaggi;</li><li>molestare altri giocatori, fare bullismo o spam;</li><li>cercare di interrompere i server o fare reverse engineering;</li><li>creare più account per eludere sanzioni.</li></ul>","terms-s5-t":"5. Proprietà intellettuale","terms-s5-b":"Il codice, la grafica, il suono, il nome «Evades 3» e il logo appartengono al team di Evades 3. Copia, rivendita o opere derivate richiedono un permesso scritto.","terms-s6-t":"6. Alpha, «così com'è», responsabilità","terms-s6-b":"Il Servizio è fornito «così com'è», senza garanzie di disponibilità, conservazione dei dati o funzionalità specifiche. Nei limiti di legge, il team non risponde di danni indiretti o incidentali.","terms-s7-t":"7. Modifiche e cessazione","terms-s7-b":"Possiamo aggiornare questi Termini. L'uso continuato ne implica l'accettazione. Possiamo sospendere o chiudere l'accesso per violazioni o per esigenze di sviluppo.","terms-s8-t":"8. Contatto","terms-s8-b":"Domande su questi Termini: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Informativa sulla privacy","privacy-subtitle":"Quali dati raccogliamo, perché e come li proteggiamo.","privacy-intro":"Questa Informativa descrive come evades3.com e il gioco Evades 3 (il «Servizio») trattano i dati personali.","privacy-s1-t":"1. Introduzione","privacy-s1-b":"Rispettiamo la tua privacy e raccogliamo solo ciò che serve per far funzionare il Servizio e comunicare con te. Non vendiamo i tuoi dati a terzi.","privacy-s2-t":"2. Dati che raccogliamo","privacy-s2-b":"<ul><li>E-mail e lingua scelta — quando ti iscrivi alla lista d'attesa alpha;</li><li>Nickname e password con hash — quando crei un account;</li><li>Dati tecnici: browser, dispositivo, posizione approssimativa dall'IP;</li><li>Statistiche di visita anonime.</li></ul>","privacy-s3-t":"3. Come usiamo i dati","privacy-s3-b":"<ul><li>Inviare inviti all'alpha e aggiornamenti importanti;</li><li>Far funzionare e migliorare il Servizio;</li><li>Proteggere da cheat, spam e abusi.</li></ul>","privacy-s4-t":"4. Archiviazione e terze parti","privacy-s4-b":"I dati di iscrizione e degli account sono salvati tramite Supabase. I pulsanti Discord e YouTube rimandano a servizi esterni con proprie informative.","privacy-s5-t":"5. Cookie e tuoi diritti","privacy-s5-b":"Usiamo il minimo di cookie — per lingua e login. Puoi richiedere accesso, rettifica o cancellazione dei tuoi dati scrivendo a <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Minori","privacy-s6-b":"Il Servizio non è destinato a minori di 13 anni. Se scopriamo di aver ricevuto dati da un minore di 13 anni, li cancelleremo.","privacy-s7-t":"7. Modifiche e contatto","privacy-s7-b":"Possiamo aggiornare questa Informativa. L'uso continuato del Servizio vale come accettazione della versione vigente. Domande: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Tutti i diritti riservati.","footer-terms":"Termini di servizio","footer-privacy":"Informativa sulla privacy","footer-cookies":"Cookie","footer-support":"Assistenza","footer-contact":"Hai domande? Scrivici a <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"pt":{"html-lang":"pt","back-home":"← Voltar ao início","languages-label":"Idioma","effective-label":"Em vigor desde","effective-date":"23 de abril de 2026","toc-title":"Seções","pick-language":"Escolha um idioma","terms-title":"Termos de serviço","terms-subtitle":"Regras curtas e claras para usar o site e o jogo Evades 3.","terms-intro":"Por favor, leia estes Termos com atenção antes de usar evades3.com e o jogo Evades 3 (o «Serviço»). Ao usar o Serviço você concorda com estes Termos.","terms-s1-t":"1. Aceitação dos termos","terms-s1-b":"Ao visitar o site ou iniciar o jogo, você confirma que leu e aceita estes Termos. Se não concorda, não use o Serviço.","terms-s2-t":"2. Sobre o Serviço e o status alpha","terms-s2-b":"Evades 3 é um jogo de arcade no navegador em alpha fechado. Funcionalidades, balanceamento, arenas e disponibilidade podem mudar ou ser removidos sem aviso. O progresso pode ser reiniciado.","terms-s3-t":"3. Idade e contas","terms-s3-b":"Você deve ter pelo menos 13 anos. Menores de 18 precisam de consentimento de pais ou responsáveis. Você é responsável pela segurança da sua conta e senha.","terms-s4-t":"4. Uso aceitável","terms-s4-b":"Não é permitido: <ul><li>usar cheats, bots, exploits ou software de terceiros para obter vantagem;</li><li>assediar outros jogadores, praticar bullying ou spam;</li><li>interferir nos servidores ou fazer engenharia reversa;</li><li>criar várias contas para escapar de banimentos.</li></ul>","terms-s5-t":"5. Propriedade intelectual","terms-s5-b":"Código, gráficos, áudio, nome «Evades 3» e logo pertencem à equipe Evades 3. Cópia, revenda ou trabalhos derivados exigem autorização por escrito.","terms-s6-t":"6. Alpha, «no estado em que se encontra», responsabilidade","terms-s6-b":"O Serviço é fornecido «no estado em que se encontra», sem garantias de disponibilidade, preservação de dados ou recursos específicos. Nos limites da lei, a equipe não responde por danos indiretos ou incidentais.","terms-s7-t":"7. Alterações e encerramento","terms-s7-b":"Podemos atualizar estes Termos. O uso continuado implica aceitação. Podemos suspender ou encerrar o acesso por violações ou necessidades de desenvolvimento.","terms-s8-t":"8. Contato","terms-s8-b":"Dúvidas sobre estes Termos: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Política de privacidade","privacy-subtitle":"Quais dados coletamos, para quê e como protegemos.","privacy-intro":"Esta Política descreve como evades3.com e o jogo Evades 3 (o «Serviço») tratam dados pessoais.","privacy-s1-t":"1. Introdução","privacy-s1-b":"Respeitamos sua privacidade e coletamos apenas o necessário para operar o Serviço e nos comunicar com você. Não vendemos seus dados.","privacy-s2-t":"2. Dados que coletamos","privacy-s2-b":"<ul><li>E-mail e idioma escolhido — ao entrar na lista do alpha;</li><li>Apelido e senha com hash — ao registrar uma conta;</li><li>Dados técnicos: navegador, dispositivo, localização aproximada por IP;</li><li>Análises anônimas de visitas.</li></ul>","privacy-s3-t":"3. Como usamos os dados","privacy-s3-b":"<ul><li>Enviar convites do alpha e atualizações importantes;</li><li>Operar e melhorar o Serviço;</li><li>Proteger contra cheats, spam e abusos.</li></ul>","privacy-s4-t":"4. Armazenamento e terceiros","privacy-s4-b":"Os dados de inscrição e das contas são armazenados via Supabase. Os botões Discord e YouTube levam a serviços externos com suas próprias políticas.","privacy-s5-t":"5. Cookies e seus direitos","privacy-s5-b":"Usamos um mínimo de cookies — para lembrar idioma e login. Você pode solicitar acesso, correção ou exclusão dos seus dados escrevendo para <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Crianças","privacy-s6-b":"O Serviço não é destinado a crianças menores de 13 anos. Se descobrirmos ter recebido dados de uma criança menor de 13 anos, serão apagados.","privacy-s7-t":"7. Alterações e contato","privacy-s7-b":"Podemos atualizar esta Política. O uso continuado implica aceitação da versão atual. Dúvidas: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Todos os direitos reservados.","footer-terms":"Termos de serviço","footer-privacy":"Política de privacidade","footer-cookies":"Cookies","footer-support":"Suporte","footer-contact":"Tem dúvidas? Escreva para <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"pl":{"html-lang":"pl","back-home":"← Powrót do strony głównej","languages-label":"Język","effective-label":"Obowiązuje od","effective-date":"23 kwietnia 2026","toc-title":"Sekcje","pick-language":"Wybierz język","terms-title":"Warunki korzystania","terms-subtitle":"Krótkie i jasne zasady korzystania ze strony i gry Evades 3.","terms-intro":"Prosimy o uważne przeczytanie tych Warunków przed korzystaniem z evades3.com i gry Evades 3 («Usługa»). Korzystając z Usługi, akceptujesz te Warunki.","terms-s1-t":"1. Akceptacja warunków","terms-s1-b":"Wchodząc na stronę lub uruchamiając grę, potwierdzasz, że przeczytałeś i akceptujesz te Warunki. Jeśli się z nimi nie zgadzasz, nie korzystaj z Usługi.","terms-s2-t":"2. O Usłudze i statusie alfa","terms-s2-b":"Evades 3 to przeglądarkowa gra zręcznościowa w zamkniętej alfie. Funkcje, balans, areny i dostępność mogą zmieniać się lub zostać usunięte bez uprzedzenia. Postęp może zostać zresetowany.","terms-s3-t":"3. Wiek i konta","terms-s3-b":"Musisz mieć co najmniej 13 lat. Użytkownicy poniżej 18 lat potrzebują zgody rodzica lub opiekuna. Jesteś odpowiedzialny za bezpieczeństwo swojego konta i hasła.","terms-s4-t":"4. Dopuszczalne użycie","terms-s4-b":"Nie wolno: <ul><li>używać cheatów, botów, exploitów ani oprogramowania osób trzecich dla przewagi;</li><li>nękać innych graczy, stosować przemocy lub spamu;</li><li>zakłócać pracy serwerów ani stosować inżynierii wstecznej;</li><li>tworzyć wielu kont w celu obejścia banów.</li></ul>","terms-s5-t":"5. Własność intelektualna","terms-s5-b":"Kod, grafika, dźwięk, nazwa «Evades 3» i logo należą do zespołu Evades 3. Kopiowanie, odsprzedaż lub dzieła pochodne wymagają pisemnej zgody.","terms-s6-t":"6. Alfa, «jak jest», odpowiedzialność","terms-s6-b":"Usługa jest świadczona «jak jest», bez gwarancji dostępności, zachowania danych ani konkretnych funkcji. W zakresie dozwolonym prawem zespół nie odpowiada za szkody pośrednie lub uboczne.","terms-s7-t":"7. Zmiany i rozwiązanie","terms-s7-b":"Możemy aktualizować te Warunki. Dalsze korzystanie oznacza ich akceptację. Możemy zawiesić lub zakończyć dostęp przy naruszeniach lub z powodu prac deweloperskich.","terms-s8-t":"8. Kontakt","terms-s8-b":"Pytania o te Warunki: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Polityka prywatności","privacy-subtitle":"Jakie dane zbieramy, dlaczego i jak je chronimy.","privacy-intro":"Ta Polityka opisuje, jak evades3.com i gra Evades 3 («Usługa») przetwarzają dane osobowe.","privacy-s1-t":"1. Wprowadzenie","privacy-s1-b":"Szanujemy Twoją prywatność i zbieramy tylko to, co potrzebne do działania Usługi i kontaktu z Tobą. Nie sprzedajemy Twoich danych.","privacy-s2-t":"2. Zbierane dane","privacy-s2-b":"<ul><li>E-mail i wybrany język — gdy zapisujesz się na listę alfa;</li><li>Nick i zhaszowane hasło — przy rejestracji konta;</li><li>Dane techniczne: przeglądarka, urządzenie, przybliżona lokalizacja z IP;</li><li>Anonimowe statystyki odwiedzin.</li></ul>","privacy-s3-t":"3. Jak wykorzystujemy dane","privacy-s3-b":"<ul><li>Wysyłanie zaproszeń do alfy i ważnych aktualizacji;</li><li>Prowadzenie i ulepszanie Usługi;</li><li>Ochrona przed cheatami, spamem i nadużyciami.</li></ul>","privacy-s4-t":"4. Przechowywanie i podmioty trzecie","privacy-s4-b":"Dane subskrypcji i kont są przechowywane w Supabase. Przyciski Discord i YouTube prowadzą do zewnętrznych serwisów z własnymi politykami prywatności.","privacy-s5-t":"5. Cookies i Twoje prawa","privacy-s5-b":"Używamy minimum cookies — do zapamiętania języka i logowania. Możesz poprosić o dostęp, poprawę lub usunięcie danych, pisząc na <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Dzieci","privacy-s6-b":"Usługa nie jest przeznaczona dla dzieci poniżej 13 roku życia. Jeśli dowiemy się, że otrzymaliśmy dane od dziecka poniżej 13 lat, usuniemy je.","privacy-s7-t":"7. Zmiany i kontakt","privacy-s7-b":"Możemy aktualizować tę Politykę. Dalsze korzystanie oznacza akceptację aktualnej wersji. Pytania: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Wszelkie prawa zastrzeżone.","footer-terms":"Warunki korzystania","footer-privacy":"Polityka prywatności","footer-cookies":"Pliki cookie","footer-support":"Pomoc","footer-contact":"Masz pytania? Napisz na <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"tr":{"html-lang":"tr","back-home":"← Ana sayfaya dön","languages-label":"Dil","effective-label":"Yürürlük tarihi","effective-date":"23 Nisan 2026","toc-title":"Bölümler","pick-language":"Bir dil seç","terms-title":"Kullanım Koşulları","terms-subtitle":"Evades 3 web sitesi ve oyununu kullanmak için kısa ve net kurallar.","terms-intro":"evades3.com sitesini ve Evades 3 oyununu («Hizmet») kullanmadan önce bu Koşulları dikkatlice okuyun. Hizmeti kullanarak bu Koşulları kabul etmiş sayılırsınız.","terms-s1-t":"1. Koşulların kabulü","terms-s1-b":"Siteye girdiğinizde veya oyunu başlattığınızda bu Koşulları okuduğunuzu ve kabul ettiğinizi onaylarsınız. Kabul etmiyorsanız Hizmeti kullanmayın.","terms-s2-t":"2. Hizmet ve alfa durumu","terms-s2-b":"Evades 3, kapalı alfa aşamasında tarayıcı tabanlı bir arcade oyundur. Özellikler, denge, arenalar ve erişilebilirlik önceden haber verilmeksizin değişebilir veya kaldırılabilir. İlerleme sıfırlanabilir.","terms-s3-t":"3. Yaş ve hesaplar","terms-s3-b":"En az 13 yaşında olmalısınız. 18 yaş altı kullanıcıların veli veya vasi onayı gerekir. Hesap ve şifre güvenliğinden siz sorumlusunuz.","terms-s4-t":"4. Kabul edilebilir kullanım","terms-s4-b":"Yasaktır: <ul><li>hile, bot, exploit veya üçüncü taraf yazılım kullanmak;</li><li>diğer oyunculara taciz, zorbalık veya spam;</li><li>sunucuları kesintiye uğratmak veya tersine mühendislik yapmak;</li><li>yasakları aşmak için birden fazla hesap açmak.</li></ul>","terms-s5-t":"5. Fikri mülkiyet","terms-s5-b":"Kod, grafikler, ses, «Evades 3» adı ve logosu Evades 3 ekibine aittir. Yazılı izin olmadan kopyalama, yeniden satış veya türev çalışmalar yapılamaz.","terms-s6-t":"6. Alfa, «olduğu gibi», sorumluluk","terms-s6-b":"Hizmet, erişilebilirlik, veri korunması veya belirli özellikler için garanti verilmeksizin «olduğu gibi» sunulur. Yasanın izin verdiği ölçüde ekip dolaylı veya arızi zararlardan sorumlu değildir.","terms-s7-t":"7. Değişiklikler ve sonlandırma","terms-s7-b":"Bu Koşulları güncelleyebiliriz. Kullanmaya devam etmek, güncel sürümü kabul etmek anlamına gelir. İhlal veya geliştirme ihtiyaçları nedeniyle erişimi askıya alabilir veya sonlandırabiliriz.","terms-s8-t":"8. İletişim","terms-s8-b":"Bu Koşullarla ilgili sorular: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Gizlilik Politikası","privacy-subtitle":"Hangi verileri topluyoruz, neden ve nasıl koruyoruz.","privacy-intro":"Bu Politika, evades3.com ve Evades 3 oyununun («Hizmet») kişisel verileri nasıl işlediğini açıklar.","privacy-s1-t":"1. Giriş","privacy-s1-b":"Gizliliğinize saygı duyarız ve yalnızca Hizmeti sürdürmek ve sizinle iletişim kurmak için gereken verileri toplarız. Verilerinizi üçüncü taraflara satmayız.","privacy-s2-t":"2. Topladığımız veriler","privacy-s2-b":"<ul><li>E-posta ve seçili dil — alfa listesine katıldığınızda;</li><li>Takma ad ve hashlenmiş şifre — hesap oluşturduğunuzda;</li><li>Teknik veriler: tarayıcı, cihaz, IP ile yaklaşık konum;</li><li>Anonim ziyaret istatistikleri.</li></ul>","privacy-s3-t":"3. Verileri nasıl kullanırız","privacy-s3-b":"<ul><li>Alfa davetleri ve önemli güncellemeler göndermek;</li><li>Hizmeti çalıştırmak ve geliştirmek;</li><li>Hile, spam ve kötüye kullanıma karşı korumak.</li></ul>","privacy-s4-t":"4. Depolama ve üçüncü taraflar","privacy-s4-b":"Abonelik ve hesap verileri Supabase üzerinden saklanır. Discord ve YouTube düğmeleri, kendi gizlilik politikaları olan dış hizmetlere yönlendirir.","privacy-s5-t":"5. Çerezler ve haklarınız","privacy-s5-b":"Yalnızca dil ve oturumu hatırlamak için az sayıda çerez kullanırız. <a href=\"mailto:support@evades3.com\">support@evades3.com</a> adresine yazarak verilerinize erişim, düzeltme veya silme talebinde bulunabilirsiniz.","privacy-s6-t":"6. Çocuklar","privacy-s6-b":"Hizmet 13 yaş altı çocuklara yönelik değildir. 13 yaş altı bir çocuğa ait veri aldığımızı öğrenirsek sileriz.","privacy-s7-t":"7. Değişiklikler ve iletişim","privacy-s7-b":"Bu Politikayı güncelleyebiliriz. Kullanmaya devam etmek, geçerli sürümü kabul anlamına gelir. Sorular: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Tüm hakları saklıdır.","footer-terms":"Kullanım Koşulları","footer-privacy":"Gizlilik Politikası","footer-cookies":"Çerezler","footer-support":"Destek","footer-contact":"Sorunuz mu var? <a href=\"mailto:support@evades3.com\">support@evades3.com</a> adresine yazın."},"nl":{"html-lang":"nl","back-home":"← Terug naar de startpagina","languages-label":"Taal","effective-label":"Geldig vanaf","effective-date":"23 april 2026","toc-title":"Secties","pick-language":"Kies een taal","terms-title":"Servicevoorwaarden","terms-subtitle":"Korte, duidelijke regels voor het gebruik van de website en het spel Evades 3.","terms-intro":"Lees deze voorwaarden zorgvuldig voordat je evades3.com en het spel Evades 3 (de «Dienst») gebruikt. Door de Dienst te gebruiken ga je akkoord met deze voorwaarden.","terms-s1-t":"1. Aanvaarding van de voorwaarden","terms-s1-b":"Door de site te bezoeken of het spel te starten bevestig je dat je deze voorwaarden hebt gelezen en accepteert. Als je niet akkoord gaat, gebruik de Dienst dan niet.","terms-s2-t":"2. Over de Dienst en de alpha-status","terms-s2-b":"Evades 3 is een arcade-spel in de browser in gesloten alpha. Functies, balans, arenas en beschikbaarheid kunnen zonder aankondiging wijzigen of worden verwijderd. Voortgang kan worden gereset.","terms-s3-t":"3. Leeftijd en accounts","terms-s3-b":"Je moet minstens 13 jaar oud zijn. Gebruikers onder de 18 hebben toestemming van een ouder of voogd nodig. Je bent verantwoordelijk voor de veiligheid van je account en wachtwoord.","terms-s4-t":"4. Toelaatbaar gebruik","terms-s4-b":"Niet toegestaan: <ul><li>cheats, bots, exploits of software van derden gebruiken voor voordeel;</li><li>andere spelers lastigvallen, pesten of spammen;</li><li>servers verstoren of reverse-engineering uitvoeren;</li><li>meerdere accounts aanmaken om verbanningen te omzeilen.</li></ul>","terms-s5-t":"5. Intellectueel eigendom","terms-s5-b":"Code, grafische elementen, geluid, de naam «Evades 3» en het logo zijn eigendom van het Evades 3-team. Kopiëren, doorverkopen of afgeleide werken vereisen schriftelijke toestemming.","terms-s6-t":"6. Alpha, «as is», aansprakelijkheid","terms-s6-b":"De Dienst wordt «as is» aangeboden, zonder garantie van beschikbaarheid, dataretentie of specifieke functies. Voor zover toegestaan door de wet is het team niet aansprakelijk voor indirecte of gevolgschade.","terms-s7-t":"7. Wijzigingen en beëindiging","terms-s7-b":"We kunnen deze voorwaarden bijwerken. Doorgaan met gebruik betekent acceptatie. We kunnen de toegang opschorten of beëindigen bij overtredingen of om ontwikkelingsredenen.","terms-s8-t":"8. Contact","terms-s8-b":"Vragen over deze voorwaarden: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Privacybeleid","privacy-subtitle":"Welke gegevens we verzamelen, waarvoor en hoe we ze beschermen.","privacy-intro":"Dit beleid beschrijft hoe evades3.com en het spel Evades 3 (de «Dienst») met persoonsgegevens omgaan.","privacy-s1-t":"1. Inleiding","privacy-s1-b":"We respecteren je privacy en verzamelen alleen wat nodig is om de Dienst te runnen en met je te communiceren. We verkopen je gegevens niet aan derden.","privacy-s2-t":"2. Welke gegevens we verzamelen","privacy-s2-b":"<ul><li>E-mail en gekozen taal — bij aanmelding voor de alpha-wachtlijst;</li><li>Nickname en gehasht wachtwoord — bij registratie;</li><li>Technische gegevens: browser, apparaat, geschatte locatie op basis van IP;</li><li>Anonieme bezoekstatistieken.</li></ul>","privacy-s3-t":"3. Hoe we gegevens gebruiken","privacy-s3-b":"<ul><li>Alpha-uitnodigingen en belangrijke updates versturen;</li><li>De Dienst draaiende houden en verbeteren;</li><li>Bescherming tegen cheats, spam en misbruik.</li></ul>","privacy-s4-t":"4. Opslag en derden","privacy-s4-b":"Abonnements- en accountgegevens worden opgeslagen via Supabase. De Discord- en YouTube-knoppen linken naar externe diensten met hun eigen privacybeleid.","privacy-s5-t":"5. Cookies en jouw rechten","privacy-s5-b":"We gebruiken zo min mogelijk cookies — voor taal en login. Je kunt inzage, correctie of verwijdering van je gegevens vragen via <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Kinderen","privacy-s6-b":"De Dienst is niet bedoeld voor kinderen onder de 13. Als we ontdekken dat we gegevens van een kind onder de 13 hebben ontvangen, verwijderen we die.","privacy-s7-t":"7. Wijzigingen en contact","privacy-s7-b":"We kunnen dit beleid bijwerken. Doorgaan met gebruik betekent acceptatie van de huidige versie. Vragen: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Alle rechten voorbehouden.","footer-terms":"Servicevoorwaarden","footer-privacy":"Privacybeleid","footer-cookies":"Cookies","footer-support":"Ondersteuning","footer-contact":"Vragen? Schrijf ons op <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"sv":{"html-lang":"sv","back-home":"← Tillbaka till startsidan","languages-label":"Språk","effective-label":"Gäller från","effective-date":"23 april 2026","toc-title":"Avsnitt","pick-language":"Välj språk","terms-title":"Användarvillkor","terms-subtitle":"Korta och tydliga regler för att använda Evades 3-webbplatsen och -spelet.","terms-intro":"Läs dessa villkor noggrant innan du använder evades3.com och spelet Evades 3 («Tjänsten»). Genom att använda Tjänsten godkänner du dessa villkor.","terms-s1-t":"1. Godkännande av villkor","terms-s1-b":"Genom att besöka webbplatsen eller starta spelet bekräftar du att du har läst och accepterat dessa villkor. Om du inte godkänner dem ska du inte använda Tjänsten.","terms-s2-t":"2. Om Tjänsten och alfa-status","terms-s2-b":"Evades 3 är ett webbläsarbaserat arcade-spel i stängd alfa. Funktioner, balans, arenor och tillgänglighet kan ändras eller tas bort utan förvarning. Framsteg kan återställas.","terms-s3-t":"3. Ålder och konton","terms-s3-b":"Du måste vara minst 13 år. Användare under 18 behöver samtycke från förälder eller vårdnadshavare. Du ansvarar för säkerheten för ditt konto och lösenord.","terms-s4-t":"4. Tillåten användning","terms-s4-b":"Följande är förbjudet: <ul><li>använda fusk, bottar, exploits eller tredjepartsprogram för fördelar;</li><li>trakassera andra spelare, mobba eller spamma;</li><li>störa servrarna eller utföra reverse engineering;</li><li>skapa flera konton för att kringgå avstängningar.</li></ul>","terms-s5-t":"5. Immateriella rättigheter","terms-s5-b":"Kod, grafik, ljud, namnet «Evades 3» och logotypen tillhör Evades 3-teamet. Kopiering, försäljning eller härledda verk kräver skriftligt tillstånd.","terms-s6-t":"6. Alfa, «i befintligt skick», ansvar","terms-s6-b":"Tjänsten tillhandahålls «i befintligt skick» utan garantier för tillgänglighet, bevarande av data eller specifika funktioner. I den mån lagen tillåter ansvarar teamet inte för indirekta eller oförutsedda skador.","terms-s7-t":"7. Ändringar och uppsägning","terms-s7-b":"Vi kan uppdatera dessa villkor. Fortsatt användning innebär godkännande. Vi kan stänga av eller avsluta åtkomsten vid överträdelser eller utvecklingsbehov.","terms-s8-t":"8. Kontakt","terms-s8-b":"Frågor om dessa villkor: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Integritetspolicy","privacy-subtitle":"Vilka data vi samlar in, varför och hur vi skyddar dem.","privacy-intro":"Denna policy beskriver hur evades3.com och spelet Evades 3 («Tjänsten») hanterar personuppgifter.","privacy-s1-t":"1. Introduktion","privacy-s1-b":"Vi respekterar din integritet och samlar endast in det som behövs för att driva Tjänsten och kommunicera med dig. Vi säljer inte dina data.","privacy-s2-t":"2. Data vi samlar in","privacy-s2-b":"<ul><li>E-post och valt språk — när du anmäler dig till alfa-kön;</li><li>Smeknamn och hashat lösenord — vid registrering;</li><li>Teknisk data: webbläsare, enhet, ungefärlig plats via IP;</li><li>Anonym besöksstatistik.</li></ul>","privacy-s3-t":"3. Hur vi använder data","privacy-s3-b":"<ul><li>Skicka alfa-inbjudningar och viktiga uppdateringar;</li><li>Driva och förbättra Tjänsten;</li><li>Skydda mot fusk, spam och missbruk.</li></ul>","privacy-s4-t":"4. Lagring och tredje part","privacy-s4-b":"Prenumerations- och kontodata lagras via Supabase. Discord- och YouTube-knapparna leder till externa tjänster med egna integritetspolicyer.","privacy-s5-t":"5. Cookies och dina rättigheter","privacy-s5-b":"Vi använder ett minimum av cookies — för språk och inloggning. Du kan begära åtkomst, rättelse eller radering av dina data genom att skriva till <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Barn","privacy-s6-b":"Tjänsten är inte avsedd för barn under 13 år. Om vi får veta att vi har fått data från ett barn under 13 år raderar vi dem.","privacy-s7-t":"7. Ändringar och kontakt","privacy-s7-b":"Vi kan uppdatera denna policy. Fortsatt användning innebär godkännande av den aktuella versionen. Frågor: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Alla rättigheter förbehållna.","footer-terms":"Användarvillkor","footer-privacy":"Integritetspolicy","footer-cookies":"Cookies","footer-support":"Support","footer-contact":"Har du frågor? Skriv till <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"no":{"html-lang":"no","back-home":"← Tilbake til forsiden","languages-label":"Språk","effective-label":"Gjelder fra","effective-date":"23. april 2026","toc-title":"Seksjoner","pick-language":"Velg et språk","terms-title":"Vilkår for bruk","terms-subtitle":"Korte og tydelige regler for å bruke Evades 3-nettstedet og -spillet.","terms-intro":"Vennligst les disse vilkårene nøye før du bruker evades3.com og spillet Evades 3 («Tjenesten»). Ved å bruke Tjenesten godtar du disse vilkårene.","terms-s1-t":"1. Aksept av vilkårene","terms-s1-b":"Ved å besøke nettstedet eller starte spillet bekrefter du at du har lest og godtar disse vilkårene. Hvis du ikke er enig, må du ikke bruke Tjenesten.","terms-s2-t":"2. Om Tjenesten og alfastatus","terms-s2-b":"Evades 3 er et nettleserbasert arkadespill i lukket alfa. Funksjoner, balansering, arenaer og tilgjengelighet kan endres eller fjernes uten varsel. Fremgang kan nullstilles.","terms-s3-t":"3. Alder og kontoer","terms-s3-b":"Du må være minst 13 år. Brukere under 18 må ha samtykke fra foreldre eller foresatte. Du er ansvarlig for sikkerheten til kontoen og passordet ditt.","terms-s4-t":"4. Akseptabel bruk","terms-s4-b":"Det er ikke tillatt å: <ul><li>bruke juks, bots, exploits eller tredjepartsprogramvare for å få fordel;</li><li>trakassere andre spillere, mobbe eller spamme;</li><li>forsøke å forstyrre serverne eller utføre omvendt utvikling;</li><li>opprette flere kontoer for å omgå utestengelser.</li></ul>","terms-s5-t":"5. Immaterielle rettigheter","terms-s5-b":"Kode, grafikk, lyd, navnet «Evades 3» og logoen tilhører Evades 3-teamet. Kopiering, videresalg eller avledede verk krever skriftlig tillatelse.","terms-s6-t":"6. Alfa, «som den er», ansvar","terms-s6-b":"Tjenesten leveres «som den er» uten garanti for tilgjengelighet, databevaring eller spesifikke funksjoner. Så langt loven tillater, er teamet ikke ansvarlig for indirekte eller tilfeldige skader.","terms-s7-t":"7. Endringer og opphør","terms-s7-b":"Vi kan oppdatere disse vilkårene. Fortsatt bruk betyr aksept. Vi kan suspendere eller avslutte tilgangen ved brudd eller utviklingsbehov.","terms-s8-t":"8. Kontakt","terms-s8-b":"Spørsmål om disse vilkårene: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-title":"Personvernerklæring","privacy-subtitle":"Hvilke data vi samler inn, hvorfor og hvordan vi beskytter dem.","privacy-intro":"Denne erklæringen beskriver hvordan evades3.com og spillet Evades 3 («Tjenesten») behandler personopplysninger.","privacy-s1-t":"1. Innledning","privacy-s1-b":"Vi respekterer personvernet ditt og samler bare inn det som trengs for å drifte Tjenesten og kommunisere med deg. Vi selger ikke dataene dine.","privacy-s2-t":"2. Data vi samler inn","privacy-s2-b":"<ul><li>E-post og valgt språk — når du melder deg på alfa-ventelisten;</li><li>Kallenavn og hashet passord — ved registrering av konto;</li><li>Tekniske data: nettleser, enhet, omtrentlig plassering fra IP;</li><li>Anonym besøksstatistikk.</li></ul>","privacy-s3-t":"3. Hvordan vi bruker data","privacy-s3-b":"<ul><li>Sende alfa-invitasjoner og viktige oppdateringer;</li><li>Drifte og forbedre Tjenesten;</li><li>Beskytte mot juks, spam og misbruk.</li></ul>","privacy-s4-t":"4. Lagring og tredjeparter","privacy-s4-b":"Abonnements- og kontodata lagres via Supabase. Discord- og YouTube-knappene lenker til eksterne tjenester med egne personvernregler.","privacy-s5-t":"5. Informasjonskapsler og dine rettigheter","privacy-s5-b":"Vi bruker et minimum av informasjonskapsler — for språk og pålogging. Du kan be om innsyn, retting eller sletting av dataene dine ved å skrive til <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","privacy-s6-t":"6. Barn","privacy-s6-b":"Tjenesten er ikke ment for barn under 13 år. Hvis vi oppdager at vi har mottatt data fra et barn under 13 år, vil vi slette dem.","privacy-s7-t":"7. Endringer og kontakt","privacy-s7-b":"Vi kan oppdatere denne erklæringen. Fortsatt bruk betyr aksept av gjeldende versjon. Spørsmål: <a href=\"mailto:support@evades3.com\">support@evades3.com</a>.","footer-copy":"© 2026 Evades 3. Alle rettigheter reservert.","footer-terms":"Vilkår for bruk","footer-privacy":"Personvernerklæring","footer-cookies":"Informasjonskapsler","footer-support":"Støtte","footer-contact":"Har du spørsmål? Skriv til <a href=\"mailto:support@evades3.com\">support@evades3.com</a>."},"fi":{"html-lang":"fi","back-home":"← Takaisin etusivulle","languages-label":"Kieli","effective-label":"Voimassa alkaen","effective-date":"23. huhtikuuta 2026","toc-title":"Osiot","pick-language":"Valitse kieli","terms-title":"Käyttöehdot","terms-subtitle":"Lyhyet ja selkeät säännöt Evades 3 -sivuston ja -pelin käyttöön.","terms-intro":"Lue nämä ehdot huolellisesti ennen evades3.com-sivuston ja Evades 3 -pelin («Palvelu») käyttöä. Palvelua käyttämällä hyväksyt nämä ehdot.","terms-s1-t":"1. Ehtojen hyväksyminen","terms-s1-b":"Käydessäsi sivustolla tai käynnistäessäsi pelin vahvistat lukeneesi ja hyväksyväsi nämä ehdot. Jos et hyväksy niitä, älä käytä Palvelua.","terms-s2-t":"2. Palvelusta ja alpha-tilasta","terms-s2-b":"Evades 3 on selainpohjainen arcade-peli suljetussa alpha-vaiheessa. Ominaisuudet, tasapaino, areenat ja saatavuus voivat muuttua tai poistua ilman ennakkovaroitusta. Edistyminen voidaan nollata.","terms-s3-t":"3. Ikä ja tilit","terms-s3-b":"Sinun on oltava vähintään 13-vuotias. Alle 18-vuotiailta vaaditaan vanhemman tai huoltajan suostumus. Olet vastuussa tilisi ja salasanasi turvallisuudesta.","terms-s4-t":"4. Hyväksyttävä käyttö","terms-s4-b":"Kiellettyä on: <ul><li>huijauksien, bottien, exploittien tai kolmannen osapuolen ohjelmistojen käyttö edun sa
